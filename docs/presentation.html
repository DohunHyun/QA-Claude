// ──────── 글로벌 스크립트 영역 ────────
let currentSlide = 0;
let isTimer = false;
let timerSeconds = 300;
let isDarkMode = true;
let currentMode = 'slide';

// 마크다운 간단 변환 함수
function convertMarkdown(text) {
  if (!text) return text;
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');
}

// 슬라이드 렌더링
function renderSlide() {
  try {
    const slide = DECK[currentSlide];
    if (!slide) {
      console.error('Slide not found:', currentSlide);
      return;
    }

    // 마크다운 변환 적용
    const convertedHtml = convertMarkdown(slide.html);

    const html = `
      <div class="px-6 md:px-12 lg:px-16 py-6 md:py-8 w-full max-w-7xl mx-auto">
        <div class="space-y-4 md:space-y-6 w-full slide-transition">
          <div>
            <span class="text-xs md:text-sm text-slate-500 tracking-wider uppercase font-bold">${slide.eyebrow}</span>
            <h2 class="text-3xl md:text-5xl lg:text-6xl font-black text-white leading-tight tracking-tight dynamic-title" style="background: linear-gradient(135deg, #60a5fa 0%, #0ea5e9 50%, #f59e0b 100%); background-size: 200% 200%; animation: gradient 3s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">${slide.title}</h2>
            <p class="text-base md:text-xl text-slate-400 mt-4 leading-relaxed dynamic-body">${slide.sub}</p>
          </div>
          <div class="mt-6 md:mt-8 pt-6 md:pt-8 border-t border-slate-800">
            ${convertedHtml}
          </div>
        </div>
      </div>
    `;

    const slideStage = document.getElementById('slideStage');
    if (!slideStage) {
      console.error('slideStage element not found');
      return;
    }

    slideStage.innerHTML = html;
    updateNav();
    updateProgress();
    renderTOC();

    console.log('✓ Slide rendered:', currentSlide + 1);
  } catch (err) {
    console.error('❌ Error rendering slide:', err);
    console.error('Slide index:', currentSlide);
    console.error('Slide data:', DECK[currentSlide]);
  }
}

// 네비게이션 업데이트
function updateNav() {
  document.getElementById('currentPageNum').textContent = currentSlide + 1;
  document.getElementById('totalPageNum').textContent = DECK.length;
  document.getElementById('btnPrev').disabled = currentSlide === 0;
  document.getElementById('btnNext').disabled = currentSlide === DECK.length - 1;
}

// 프로그레스바 업데이트
function updateProgress() {
  const progress = ((currentSlide + 1) / DECK.length) * 100;
  document.getElementById('progressBarFill').style.width = progress + '%';
}

// 목차 렌더링 (네비게이션 제거됨)
function renderTOC() {
  const tocContainer = document.getElementById('tocContainer');
  if (tocContainer) {
    const tocHtml = DECK.map((slide, index) => `
      <button
        onclick="goSlide(${index})"
        class="w-full text-left px-3 py-2.5 rounded-lg text-xs md:text-sm font-medium transition-all ${
          index === currentSlide
            ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30'
            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/40'
        }"
      >
        <span class="text-[9px] font-bold text-slate-500">${String(index + 1).padStart(2, '0')}</span> ${slide.toc}
      </button>
    `).join('');
    tocContainer.innerHTML = tocHtml;
  }
}

// 슬라이드 이동
function goSlide(n) {
  console.log('goSlide called with:', n, 'Current:', currentSlide, 'Total:', DECK.length);
  if (n >= 0 && n < DECK.length) {
    currentSlide = n;
    renderSlide();
  } else {
    console.warn('Invalid slide index:', n);
  }
}

// 타이머 토글
function toggleTimer() {
  isTimer = !isTimer;
  document.getElementById('timerIcon').classList.toggle('fa-play', !isTimer);
  document.getElementById('timerIcon').classList.toggle('fa-pause', isTimer);

  if (isTimer) {
    const interval = setInterval(() => {
      if (isTimer && timerSeconds > 0) {
        timerSeconds--;
        updateTimer();
      } else if (timerSeconds === 0) {
        clearInterval(interval);
        isTimer = false;
      }
    }, 1000);
  }
}

// 타이머 리셋
function resetTimer() {
  timerSeconds = 300;
  isTimer = false;
  updateTimer();
  document.getElementById('timerIcon').classList.add('fa-play');
  document.getElementById('timerIcon').classList.remove('fa-pause');
}

// 타이머 업데이트
function updateTimer() {
  const min = Math.floor(timerSeconds / 60);
  const sec = timerSeconds % 60;
  document.getElementById('pitchTimer').textContent =
    String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

// 전체화면 토글
function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// 키보드 네비게이션
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') goSlide(currentSlide + 1);
});

// 초기화
renderSlide();
</script>
