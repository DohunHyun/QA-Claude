    updateProgress();
    renderTOC();

    // 표지: 핵심 지표 카운트업 + 타이틀 타이핑 (표지에서 주기적 반복)
    stopCoverLoop();
    animateCountUps();
    if (currentSlide === 0) {
      typeCoverTitle();
      startCoverLoop();
    }

    console.log('✓ Slide rendered:', currentSlide + 1);
  } catch (err) {
    console.error('❌ Error rendering slide:', err);
    console.error('Slide index:', currentSlide);
    console.error('Slide data:', DECK[currentSlide]);
  }
}

// 핵심 지표 카운트업 애니메이션 (0 → 목표값)
function animateCountUps() {
  const els = document.querySelectorAll('#slideStage [data-countup]');
  els.forEach((el) => {
    const target = parseFloat(el.getAttribute('data-countup')) || 0;
    const decimals = parseInt(el.getAttribute('data-decimals') || '0', 10);
    const suffix = el.getAttribute('data-suffix') || '';
    const duration = 1400;
    const start = performance.now();
    function frame(now) {
      const p = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
      el.textContent = (target * eased).toFixed(decimals) + suffix;
      if (p < 1) {
        requestAnimationFrame(frame);
      } else {
        el.textContent = target.toFixed(decimals) + suffix;
      }
    }
    requestAnimationFrame(frame);
  });
}

// 표지 타이틀 타이핑 효과
let typeToken = 0;
function typeCoverTitle() {
  const el = document.getElementById('slideTitle');
  if (!el) return;
  const full = el.getAttribute('data-full') || el.textContent;
  el.setAttribute('data-full', full);
  const myToken = ++typeToken; // 진행 중이던 이전 타이핑은 무효화
  let i = 0;
  el.textContent = '';
  function step() {
    if (myToken !== typeToken) return;
    i++;
    el.textContent = full.slice(0, i) + (i < full.length ? '▮' : '');
    if (i < full.length) {
      setTimeout(step, 60);
    } else {
      el.textContent = full;
    }
  }
  step();
}

// 표지 애니메이션 반복 루프 (표지에 머무는 동안 일정 주기로 재생)
let coverLoopTimer = null;
function stopCoverLoop() {
  if (coverLoopTimer) { clearInterval(coverLoopTimer); coverLoopTimer = null; }
}
function startCoverLoop() {
  stopCoverLoop();
  coverLoopTimer = setInterval(() => {
    if (currentSlide !== 0) { stopCoverLoop(); return; } // 표지 벗어나면 중단
    typeCoverTitle();
    animateCountUps();
  }, 7000);
}

// 네비게이션 업데이트
function updateNav() {
  document.getElementById('currentPageNum').textContent = currentSlide + 1;
  document.getElementById('totalPageNum').textContent = DECK.length;
  document.getElementById('btnPrev').disabled = currentSlide === 0;
  document.getElementById('btnNext').disabled = currentSlide === DECK.length - 1;
}

// 프로그레스바 업데이트
function updateProgress() {
  const progress = ((currentSlide + 1) / DECK.length) * 100;
  document.getElementById('progressBarFill').style.width = progress + '%';
}

// 목차 렌더링 (네비게이션 제거됨)
function renderTOC() {
  const tocContainer = document.getElementById('tocContainer');
  if (tocContainer) {
    const tocHtml = DECK.map((slide, index) => `
      <button
        onclick="goSlide(${index})"
        class="w-full text-left px-3 py-2.5 rounded-lg text-base md:text-base font-medium transition-all ${
          index === currentSlide
            ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30'
            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/40'
        }"
      >
        <span class="text-sm font-bold text-slate-500">${String(index + 1).padStart(2, '0')}</span> ${slide.toc}
      </button>
    `).join('');
    tocContainer.innerHTML = tocHtml;
  }
}

// 슬라이드 이동
function goSlide(n) {
  console.log('goSlide called with:', n, 'Current:', currentSlide, 'Total:', DECK.length);
  if (n >= 0 && n < DECK.length) {
    currentSlide = n;
    renderSlide();
  } else {
    console.warn('Invalid slide index:', n);
  }
}

// 타이머 토글
function toggleTimer() {
  isTimer = !isTimer;
  const icon = document.getElementById('timerIcon');
  if (icon) {
    icon.classList.toggle('fa-play', !isTimer);
    icon.classList.toggle('fa-pause', isTimer);
  }

  if (isTimer) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (remainingSeconds > 0) {
        remainingSeconds--;
        updateTimer();
      }
      if (remainingSeconds <= 0) {   // 종료: 정지
        clearInterval(timerInterval);
        timerInterval = null;
        isTimer = false;
        const ic = document.getElementById('timerIcon');
        if (ic) { ic.classList.add('fa-play'); ic.classList.remove('fa-pause'); }
      }
    }, 1000);
  } else if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// 타이머 리셋 (10분으로 초기화)
function resetTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  isTimer = false;
  remainingSeconds = TIMER_START;
  updateTimer();
  const icon = document.getElementById('timerIcon');
  if (icon) {
    icon.classList.add('fa-play');
    icon.classList.remove('fa-pause');
  }
}

// 타이머 표시 갱신 (남은 시간 카운트다운, 잔여 시간 적을수록 강조)
function updateTimer() {
  const min = Math.floor(remainingSeconds / 60);
  const sec = remainingSeconds % 60;
  const el = document.getElementById('pitchTimer');
  if (el) {
    el.textContent = String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    el.classList.toggle('text-red-400', remainingSeconds <= 60);   // 1분 이하: 빨강
    el.classList.toggle('text-amber-400', remainingSeconds > 60 && remainingSeconds <= 120); // 1~2분: 주황
    el.classList.toggle('text-slate-100', remainingSeconds > 120);
  }
}

// 전체화면 토글
function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// 키보드 네비게이션
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') goSlide(currentSlide + 1);
});

// 초기화
renderSlide();
</script>

.animate-fadeIn {

  display: flex;

#slideStage {
