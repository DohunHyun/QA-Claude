spring:
  application:
    name: qa-gpt
  # 기본은 H2 인메모리 — 즉시 실행 가능. 운영은 --spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:mem:qagpt;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

# Claude API 연동 (WebClientConfig / ClaudeClientImpl)
qagpt:
  claude:
    base-url: https://api.anthropic.com
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
    version: "2023-06-01"
    max-tokens: 4096

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# 운영 프로파일: PostgreSQL
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qagpt}
    username: ${DB_USER:qagpt}
    password: ${DB_PASSWORD:qagpt}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
