# Railway 등 PaaS는 리슨 포트를 PORT 환경변수로 주입한다. 로컬은 8080 기본.
server:
  port: ${PORT:8080}

spring:
  application:
    name: qa-gpt
  # 기본은 H2 인메모리 — 즉시 실행 가능. 운영은 --spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:mem:qagpt;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

# Claude API 연동 (WebClientConfig / ClaudeClientImpl)
qagpt:
  # 업로드 산출물 원본 저장 경로 (FileStorageService — .gitignore 처리됨)
  storage:
    dir: uploads
  claude:
    base-url: https://api.anthropic.com
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
    version: "2023-06-01"
    max-tokens: 4096
    # 재검증 재현성(S2 수락기준): 0.0=결정적. 값을 올리면 판정이 요청마다 달라질 수 있음.
    temperature: 0.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# 운영 프로파일: PostgreSQL
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qagpt}
    username: ${DB_USER:qagpt}
    password: ${DB_PASSWORD:qagpt}
    driver-class-name: org.postgresql.Driver
  jpa:
    # 빈 DB에 최초 기동 시 엔티티 기준으로 스키마 자동 생성/갱신.
    # (validate 는 스키마가 이미 있어야만 통과 → 신규 Postgres 에선 기동 실패)
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
