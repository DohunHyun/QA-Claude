<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현황/통계 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    .bar-row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12.5px}
    .bar-row .lab{width:120px;color:#33445c;font-weight:700}
    .bar-row .track{flex:1;height:16px;background:#eef2f7;border-radius:8px;overflow:hidden}
    .bar-row .track > span{display:block;height:100%}
    .bar-row .val{width:52px;text-align:right;color:#5b6675}
    .donut{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
    .donut .hole{width:96px;height:96px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    /* 프로젝트×단계 현황 매트릭스 */
    .sdot{display:inline-block;width:12px;height:12px;border-radius:50%;background:#d6dde7;vertical-align:middle}
    .sdot.done{background:var(--ok)} .sdot.run{background:var(--blue)} .sdot.wait{background:#d6dde7}
    .mini-track{display:inline-block;width:70px;height:9px;background:#eef2f7;border-radius:5px;overflow:hidden;vertical-align:middle;margin-right:6px}
    .mini-track > span{display:block;height:100%;background:var(--ok)}
    .legend-dot{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#5b6675;margin-left:12px}
  </style>
</head>
<body data-nav="stats" data-page="statistics">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> 현황/통계 <span class="sep">›</span> 프로젝트 현황</div>
    <div class="page-head">
      <div><h1>프로젝트 현황 / 통계</h1><p>전사 프로젝트의 단계별 진행 상황과 품질검증 지표를 한눈에 파악합니다.</p></div>
    </div>

    <div id="detail"></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M=window.MOCK, e=M.esc;
    var SP=M.STAT_PROJECTS;
    var DTYPES=['표준미준수','필수항목누락','내용오류·불명확','미제출','중복','기타'];
    var STAGES=[['mgmt','관리'],['analysis','분석'],['design','설계'],['test','테스트'],['deploy','이행']];

    (function render(){
      // ── 요약 KPI (전체 포트폴리오) ──
      var total=SP.length;
      var running=SP.filter(function(p){ return STAGES.some(function(s){ return p[s[0]]==='run'; }); }).length;
      var improve=SP.reduce(function(a,p){ return a+p.improve; },0);
      var recommend=SP.reduce(function(a,p){ return a+p.recommend; },0);
      var avgDone=Math.round(SP.reduce(function(a,p){ return a+p.doneRate; },0)/total);

      var html='<div class="kpis">'
        + '<div class="kpi"><div class="k-label">전체 프로젝트</div><div class="k-value">'+total+'<small> 건</small></div></div>'
        + '<div class="kpi run"><div class="k-label">진행 중</div><div class="k-value" style="color:var(--blue)">'+running+'<small> 건</small></div></div>'
        + '<div class="kpi err"><div class="k-label">누적 개선</div><div class="k-value">'+improve+'<small> 건</small></div></div>'
        + '<div class="kpi ok"><div class="k-label">평균 조치완료율</div><div class="k-value">'+avgDone+'<small> %</small></div></div>'
        + '</div>';

      // ── 전체 프로젝트 현황 장표 (프로젝트 × 단계 매트릭스) ──
      html+='<section class="panel"><div class="p-head"><h2>전체 프로젝트 현황</h2>'
        + '<span class="more">'
        +   '<span class="legend-dot"><span class="sdot done"></span>완료</span>'
        +   '<span class="legend-dot"><span class="sdot run"></span>진행중</span>'
        +   '<span class="legend-dot"><span class="sdot wait"></span>예정</span>'
        + '</span></div>'
        + '<div class="p-body flush"><div class="tbl-scroll"><table class="tbl">'
        + '<thead><tr><th class="num">코드</th><th>프로젝트명</th><th class="num">PM</th>'
        + STAGES.map(function(s){ return '<th class="num">'+s[1]+'</th>'; }).join('')
        + '<th class="num">검토</th><th class="num">개선</th><th class="num">권고</th><th style="width:150px">조치완료율</th></tr></thead><tbody>';
      html+=SP.map(function(p){
        var cells=STAGES.map(function(s){ return '<td class="num"><span class="sdot '+p[s[0]]+'" title="'+p[s[0]]+'"></span></td>'; }).join('');
        return '<tr><td class="num"><span class="pill g">'+e(p.code)+'</span></td>'
          +'<td><b>'+e(p.name)+'</b></td><td class="num">'+e(p.pm)+'</td>'
          + cells
          +'<td class="num">'+p.reviews+'</td><td class="num">'+p.improve+'</td><td class="num">'+p.recommend+'</td>'
          +'<td><span class="mini-track"><span style="width:'+p.doneRate+'%"></span></span><span class="muted" style="font-size:11px">'+p.doneRate+'%</span></td></tr>';
      }).join('');
      html+='</tbody></table></div></div></section>';

      // ── 결함유형 분포 + 개선/권고 도넛 (상세 검증 3개 프로젝트 기준) ──
      var defects=[]; M.PROJECTS.forEach(function(p){ defects=defects.concat(M.defectsFor(p.code)); });
      var dImp=defects.filter(function(d){return d.sev==='개선';}).length;
      var dRec=defects.filter(function(d){return d.sev==='권고';}).length;
      var totalDef=defects.length;
      var byType=DTYPES.map(function(t){ return { t:t, n:defects.filter(function(d){return d.dtype===t;}).length }; });
      var maxN=Math.max(1, Math.max.apply(null, byType.map(function(x){return x.n;})));
      var typeColor={'표준미준수':'var(--err)','필수항목누락':'var(--err)','내용오류·불명확':'var(--warn)','중복':'var(--warn)','기타':'var(--blue)','미제출':'#94a3b8'};
      var bars=byType.map(function(x){
        return '<div class="bar-row"><div class="lab">'+e(x.t)+'</div>'
          +'<div class="track"><span style="width:'+Math.round(x.n/maxN*100)+'%;background:'+typeColor[x.t]+'"></span></div>'
          +'<div class="val">'+x.n+'</div></div>';
      }).join('');
      var totalIW=dImp+dRec;
      var impPct=totalIW?Math.round(dImp/totalIW*100):0;
      var donutStyle='background:conic-gradient(var(--err) 0 '+impPct+'%, var(--warn) '+impPct+'% 100%)';

      html+='<div class="grid2">'
        + '<section class="panel" id="defect"><div class="p-head"><h2>결함유형 분포 (6종)</h2><span class="more">상세 검증 기준</span></div><div class="p-body">'
        + (totalDef? bars : '<div class="muted">집계할 결함 데이터가 없습니다.</div>')
        + '</div></section>'
        + '<section class="panel"><div class="p-head"><h2>개선 vs 권고 비율</h2></div><div class="p-body">'
        + '<div class="donut" style="'+donutStyle+'"><div class="hole"><b style="font-size:20px">'+totalDef+'</b><span class="muted">총 결함</span></div></div>'
        + '<div class="legend" style="justify-content:center;margin-top:14px">'
        +   '<span><span class="badge 개선">개선</span> '+dImp+'건 ('+impPct+'%)</span>'
        +   '<span><span class="badge 권고">권고</span> '+dRec+'건 ('+(totalIW?100-impPct:0)+'%)</span>'
        + '</div></div></section></div>';

      document.getElementById('detail').innerHTML=html;
    })();
  </script>
</body>
</html>
