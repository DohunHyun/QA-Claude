<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA-GPT — 산출물 품질 검증</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 980px; margin: 40px auto; padding: 0 16px; color: #222; }
        h1 { font-size: 22px; }
        h2 { font-size: 16px; margin: 0 0 12px; }
        h3 { font-size: 14px; margin: 16px 0 6px; }
        .card { border: 1px solid #e2e2e2; border-radius: 10px; padding: 20px; margin-top: 16px; }
        .card.disabled { opacity: .5; pointer-events: none; }
        label { display: block; font-size: 13px; color: #555; margin: 10px 0 4px; }
        input, select { padding: 7px 9px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        input[type=text], select { width: 100%; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
        .dates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px 16px; }
        button { padding: 8px 16px; border: 0; border-radius: 6px; background: #2d6cdf; color: #fff; cursor: pointer; font-size: 14px; margin-top: 14px; }
        button:disabled { background: #9db8ea; cursor: default; }
        button.secondary { background: #6b7280; }
        button.small { padding: 4px 10px; font-size: 12px; margin: 0; }
        button.warn { background: #d64545; }
        button.ok-btn { background: #1f9d55; }
        table { border-collapse: collapse; width: 100%; margin-top: 12px; }
        th, td { border: 1px solid #e2e2e2; padding: 8px 10px; font-size: 13px; text-align: left; vertical-align: top; }
        th { background: #f6f8fb; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; color: #fff; white-space: nowrap; }
        .badge.개선 { background: #d64545; }
        .badge.권고 { background: #e0912f; }
        .pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; background: #eef2fb; color: #2d6cdf; margin-right: 4px; }
        .pill.gray { background: #f1f1f1; color: #666; }
        .pill.green { background: #e6f6ec; color: #1f9d55; }
        .ok { color: #1f9d55; font-weight: 600; }
        .err { color: #d64545; font-weight: 600; }
        .muted { color: #888; font-size: 13px; }
        .step { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%; background: #2d6cdf; color: #fff; font-size: 13px; margin-right: 8px; }
        #projInfo { margin-top: 12px; }
        .result-item { border: 1px solid #eee; border-radius: 8px; padding: 14px; margin-top: 12px; background: #fcfcfd; }
        .result-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .dl-links a, .dl-links button { margin-right: 8px; }
        .dl-links a { font-size: 13px; }
        progress { width: 100%; height: 14px; margin-top: 10px; }
        .gate { display: inline-block; border: 1px solid #e2e2e2; border-radius: 8px; padding: 10px 14px; margin: 8px 8px 0 0; font-size: 13px; }
        .gate.passed { border-color: #1f9d55; background: #e6f6ec; }
        details { margin-top: 10px; }
        summary { cursor: pointer; font-size: 13px; color: #2d6cdf; }
        td select, td input { padding: 4px 6px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>QA-GPT — 산출물 품질 검증</h1>
    <p class="muted">
        프로젝트 등록·승인 → 산출물 업로드(다중, 유형 자동 인식) → 검증 결과·3종 결과물 → 시정조치 추적 → 회차별 현황·단계 게이트.
        API 문서: <a href="/swagger-ui.html">/swagger-ui.html</a>
    </p>

    <!-- ── 1. 프로젝트 ────────────────────────────────────────── -->
    <div class="card" id="projectCard">
        <h2><span class="step">1</span>프로젝트</h2>

        <div class="grid">
            <div><label>프로젝트명 *</label><input type="text" id="projName" placeholder="투자자문 관리시스템 구축"></div>
            <div><label>프로젝트코드 *</label><input type="text" id="projCode" placeholder="NBIA"></div>
        </div>

        <label>단계별 기간 <span class="muted">(선택 — 명명규칙·제개정일자 검증 기준값)</span></label>
        <div class="dates">
            <div><span class="muted">관리 시작</span><input type="date" id="mgmtStart"></div>
            <div><span class="muted">분석 시작</span><input type="date" id="anStart"></div>
            <div><span class="muted">설계 시작</span><input type="date" id="dsStart"></div>
            <div><span class="muted">관리 종료</span><input type="date" id="mgmtEnd"></div>
            <div><span class="muted">분석 종료</span><input type="date" id="anEnd"></div>
            <div><span class="muted">설계 종료</span><input type="date" id="dsEnd"></div>
        </div>

        <button id="createProjBtn">프로젝트 등록</button>
        <button id="approveProjBtn" class="secondary" style="display:none;">관리자 승인(활성화)</button>
        <button id="loadProjBtn" class="secondary">ID로 불러오기</button>
        <input type="text" id="loadProjId" placeholder="기존 프로젝트 ID" style="width:150px; margin-left:8px;">

        <div id="projInfo"></div>
    </div>

    <!-- ── 2. 산출물 검증 ─────────────────────────────────────── -->
    <div class="card disabled" id="uploadCard">
        <h2><span class="step">2</span>산출물 검증 <span class="muted">(다중 업로드 · HWPX/Excel/PPTX)</span></h2>
        <form id="uploadForm">
            <label>산출물 유형 <span class="muted">(기본: AI 자동 인식 — 파일명·구조 기반)</span></label>
            <select id="artifactType"></select>
            <label>파일 (.xlsx / .pptx / .hwpx — 여러 개 선택 가능)</label>
            <input type="file" id="file" accept=".xlsx,.pptx,.hwpx" multiple required>
            <br>
            <button type="submit" id="submitBtn">검증</button>
        </form>
        <progress id="progressBar" max="1" value="0" style="display:none;"></progress>
        <div id="progressText" class="muted"></div>
    </div>

    <!-- ── 3. 검증 결과 ──────────────────────────────────────── -->
    <div class="card" id="resultCard" style="display:none;">
        <h2><span class="step">3</span>검증 결과 <span class="muted">(결과물 다운로드 · QA 승인 · 시정조치 관리)</span></h2>
        <div id="results"></div>
    </div>

    <!-- ── 4. 회차별 현황 ─────────────────────────────────────── -->
    <div class="card" id="historyCard" style="display:none;">
        <h2><span class="step">4</span>회차별 현황 · 단계 게이트</h2>
        <div id="stageGates"></div>
        <div id="artifactHistory"></div>
        <button id="crossBtn" class="secondary small" style="margin-top:12px;">교차 산출물 정합성 검사</button>
        <div id="crossResult"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // ArtifactType enum(도메인) 미러 — [name, 표시라벨]
        var ARTIFACT_TYPES = [
            ['DOCUMENT_WRITING_GUIDELINE', '문서작성지침서'],
            ['TAILORING_RESULT', '테일러링결과서'],
            ['REQUIREMENT_TRACEABILITY_MATRIX', '요구사항추적표'],
            ['REQUIREMENT_DEFINITION', '요구사항정의서'],
            ['PROCESS_DEFINITION', '프로세스정의서'],
            ['INTERFACE_DEFINITION', '인터페이스정의서'],
            ['BATCH_JOB_LIST', '배치Job목록'],
            ['UI_LIST', 'UI목록'],
            ['PROGRAM_LIST', '프로그램목록'],
            ['INTERFACE_DESIGN', '인터페이스설계서'],
            ['BATCH_DESIGN', '배치설계서']
        ];
        var ACTION_STATUSES = [['TARGET', '대상'], ['IN_PROGRESS', '진행'], ['DONE', '완료']];

        var currentProject = null; // {id, name, code, status}

        // ── 유형 드롭다운 (자동 인식 기본) ─────────────────────
        (function fillArtifactTypes() {
            var opts = '<option value="">자동 인식 (권장)</option>' +
                ARTIFACT_TYPES.map(function (t) {
                    return '<option value="' + t[0] + '">' + escapeHtml(t[1]) + '</option>';
                }).join('');
            $('#artifactType').html(opts);
        })();

        // ── 1. 프로젝트 등록/승인/불러오기 ─────────────────────
        $('#createProjBtn').on('click', function () {
            var name = $('#projName').val().trim();
            var code = $('#projCode').val().trim();
            if (!name || !code) { alert('프로젝트명과 코드는 필수입니다.'); return; }
            var payload = {
                name: name, code: code,
                managementStart: dateOrNull('#mgmtStart'), managementEnd: dateOrNull('#mgmtEnd'),
                analysisStart: dateOrNull('#anStart'), analysisEnd: dateOrNull('#anEnd'),
                designStart: dateOrNull('#dsStart'), designEnd: dateOrNull('#dsEnd')
            };
            setBtn('#createProjBtn', true, '등록 중…');
            $.ajax({ url: '/api/projects', type: 'POST', contentType: 'application/json', data: JSON.stringify(payload) })
                .done(setProject)
                .fail(function (xhr) { $('#projInfo').html('<span class="err">등록 실패: ' + errMsg(xhr) + '</span>'); })
                .always(function () { setBtn('#createProjBtn', false, '프로젝트 등록'); });
        });

        $('#approveProjBtn').on('click', function () {
            if (!currentProject) { return; }
            $.ajax({ url: '/api/projects/' + currentProject.id + '/approve', type: 'POST' })
                .done(setProject)
                .fail(function (xhr) { alert('승인 실패: ' + errMsg(xhr)); });
        });

        $('#loadProjBtn').on('click', function () {
            var id = $('#loadProjId').val().trim();
            if (!id) { alert('프로젝트 ID를 입력하세요.'); return; }
            $.ajax({ url: '/api/projects/' + encodeURIComponent(id), type: 'GET' })
                .done(setProject)
                .fail(function (xhr) { $('#projInfo').html('<span class="err">불러오기 실패: ' + errMsg(xhr) + '</span>'); });
        });

        function setProject(res) {
            currentProject = res;
            var statusPill = res.status === 'ACTIVE'
                ? '<span class="pill green">활성(승인됨)</span>'
                : '<span class="pill gray">' + escapeHtml(res.status || '') + ' — 관리자 승인 대기</span>';
            $('#projInfo').html(
                '<span class="pill">등록됨</span> <b>' + escapeHtml(res.name) + '</b> ' +
                '<span class="muted">(' + escapeHtml(res.code) + ' · #' + res.id + ')</span> ' + statusPill);
            $('#approveProjBtn').toggle(res.status !== 'ACTIVE');
            $('#uploadCard').removeClass('disabled');
            $('#resultCard').hide();
            $('#results').empty();
            loadStatus();
        }

        // ── 2. 다중 업로드·검증 (파일별 순차 → 진행도 표시) ─────
        $('#uploadForm').on('submit', function (e) {
            e.preventDefault();
            var files = $('#file')[0].files;
            if (!files.length) { return; }
            var picked = $('#artifactType').val(); // ''=자동 인식

            setBtn('#submitBtn', true, '검증 중…');
            $('#resultCard').show();
            $('#results').empty();
            $('#progressBar').attr('max', files.length).val(0).show();

            var idx = 0;
            (function next() {
                if (idx >= files.length) {
                    $('#progressText').text('완료 — ' + files.length + '개 파일 검증됨');
                    setBtn('#submitBtn', false, '검증');
                    loadStatus();
                    setTimeout(function () { $('#progressBar').hide(); $('#progressText').empty(); }, 2500);
                    return;
                }
                var file = files[idx];
                $('#progressText').text('검증 중 (' + (idx + 1) + '/' + files.length + '): ' + file.name);

                var fd = new FormData();
                fd.append('file', file);
                if (picked && files.length === 1) { fd.append('artifactType', picked); }
                if (currentProject) { fd.append('projectId', currentProject.id); }

                $.ajax({ url: '/api/validate', type: 'POST', data: fd, processData: false, contentType: false })
                    .done(function (res) { renderResult(file.name, res); })
                    .fail(function (xhr) {
                        $('#results').append('<div class="result-item"><b>' + escapeHtml(file.name) +
                            '</b> — <span class="err">오류: ' + errMsg(xhr) + '</span></div>');
                    })
                    .always(function () {
                        idx++;
                        $('#progressBar').val(idx);
                        next();
                    });
            })();
        });

        // ── 3. 결과 카드: 판정·결함·3종 결과물·QA 승인·시정조치 ──
        function renderResult(fileName, res) {
            var rid = res.reviewId;
            var typeLabel = res.artifactLabel ? '<span class="pill">' + escapeHtml(res.artifactLabel) + '</span>' : '';
            var verdict = res.passed
                ? '<span class="ok">✔ 통과 (결함 없음)</span>'
                : '<span class="err">✘ ' + escapeHtml(res.message) + ' — 통과 불가(개선 잔존 시)</span>';

            var defectRows = (res.defects || []).map(function (d) {
                return '<tr>' +
                    '<td><span class="badge ' + escapeHtml(d.severity) + '">' + escapeHtml(d.severity) + '</span></td>' +
                    '<td>' + escapeHtml(d.defectType) + '</td>' +
                    '<td>' + escapeHtml(d.perspective) + '</td>' +
                    '<td>' + escapeHtml(d.location) + '</td>' +
                    '<td>' + escapeHtml(d.description) + '</td>' +
                    '<td>' + escapeHtml(d.improvementGuide) + '</td></tr>';
            }).join('');
            var defectTable = defectRows
                ? '<table><thead><tr><th>판정</th><th>결함유형</th><th>관점</th><th>근거위치</th><th>내용</th><th>개선방향</th></tr></thead><tbody>' + defectRows + '</tbody></table>'
                : '';

            var isXlsx = /\.xlsx$/i.test(fileName);
            var improvedLink = (!res.passed && isXlsx)
                ? '<a href="/api/reviews/' + rid + '/improved-artifact">① AI 개선 산출물(.xlsx)</a>'
                : '<span class="muted">① 개선 산출물 ' + (res.passed ? '(결함 없음)' : '(xlsx만 지원)') + '</span>';

            var html =
                '<div class="result-item" id="review-' + rid + '">' +
                '  <div class="result-head">' +
                '    <div><b>' + escapeHtml(fileName) + '</b> ' + typeLabel + ' <span class="muted">검토 #' + rid + '</span></div>' +
                '    <div>' + verdict + '</div>' +
                '  </div>' +
                defectTable +
                '  <h3>결과물 다운로드</h3>' +
                '  <div class="dl-links">' +
                improvedLink +
                '    <a href="/api/reviews/' + rid + '/corrective-action-ledger">② 시정조치관리대장(.xlsx)</a>' +
                '    <span id="report-slot-' + rid + '" class="muted">③ 검토결과서 — QA 승인 필요</span>' +
                '  </div>' +
                '  <h3>QA 승인 <span class="muted">(승인 후 단계말 검토결과서 발급)</span></h3>' +
                '  <div id="qa-' + rid + '">' +
                '    <button class="small ok-btn" onclick="approve(' + rid + ', false)">QA 승인</button> ' +
                '    <button class="small warn" onclick="approve(' + rid + ', true)">QA 예외 승인</button>' +
                '    <span class="muted" id="qa-msg-' + rid + '"></span>' +
                '  </div>' +
                (res.defects && res.defects.length
                    ? '<details><summary>시정조치 관리 (' + res.defects.length + '건 — 상태 추적)</summary>' +
                      '<div id="actions-' + rid + '" class="muted">불러오는 중…</div></details>'
                    : '') +
                '</div>';
            $('#results').append(html);

            if (res.defects && res.defects.length) { loadActions(rid); }
        }

        // ── QA 승인 / 예외 승인 ────────────────────────────────
        window.approve = function (rid, exception) {
            $.ajax({ url: '/api/reviews/' + rid + '/approve?exception=' + exception, type: 'POST' })
                .done(function (res) {
                    $('#qa-msg-' + rid).html('<span class="ok">' + escapeHtml(res.message) + '</span>');
                    $('#report-slot-' + rid).html('<a href="/api/reviews/' + rid + '/review-report">③ 단계말 검토결과서(.hwpx)</a>');
                })
                .fail(function (xhr) {
                    $('#qa-msg-' + rid).html('<span class="err">' + errMsg(xhr) + '</span>');
                });
        };

        // ── 시정조치 관리 (라인 목록 + 상태 갱신) ───────────────
        function loadActions(rid) {
            $.ajax({ url: '/api/reviews/' + rid + '/corrective-actions', type: 'GET' })
                .done(function (list) {
                    if (!list || !list.length) { $('#actions-' + rid).html('<span class="muted">시정조치 항목 없음</span>'); return; }
                    var rows = list.map(function (a) {
                        var opts = ACTION_STATUSES.map(function (s) {
                            return '<option value="' + s[0] + '"' + (a.status === s[0] ? ' selected' : '') + '>' + s[1] + '</option>';
                        }).join('');
                        return '<tr>' +
                            '<td>' + escapeHtml(a.no) + '</td>' +
                            '<td><span class="badge ' + escapeHtml(a.improvementType) + '">' + escapeHtml(a.improvementType) + '</span></td>' +
                            '<td>' + escapeHtml(a.nonconformityContent) + '</td>' +
                            '<td><select id="st-' + a.id + '">' + opts + '</select></td>' +
                            '<td><input type="text" id="as-' + a.id + '" value="' + escapeHtml(a.assignee || '') + '" placeholder="담당자" style="width:80px;"></td>' +
                            '<td>' + escapeHtml(a.confirmedDate || '') + '</td>' +
                            '<td><button class="small" onclick="saveAction(' + rid + ',' + a.id + ')">저장</button></td></tr>';
                    }).join('');
                    $('#actions-' + rid).html(
                        '<table><thead><tr><th>No</th><th>유형</th><th>결함내용</th><th>상태</th><th>담당자</th><th>완료일</th><th></th></tr></thead><tbody>' +
                        rows + '</tbody></table>');
                })
                .fail(function () { $('#actions-' + rid).html('<span class="err">시정조치 조회 실패</span>'); });
        }

        window.saveAction = function (rid, actionId) {
            var params = new URLSearchParams();
            params.set('status', $('#st-' + actionId).val());
            var assignee = $('#as-' + actionId).val().trim();
            if (assignee) { params.set('assignee', assignee); }
            $.ajax({ url: '/api/corrective-actions/' + actionId + '?' + params.toString(), type: 'PATCH' })
                .done(function () { loadActions(rid); loadStatus(); })
                .fail(function (xhr) { alert('저장 실패: ' + errMsg(xhr)); });
        };

        // ── 4. 회차별 현황 + 단계 게이트 + 교차 정합성 ──────────
        function loadStatus() {
            if (!currentProject) { return; }
            $.ajax({ url: '/api/projects/' + currentProject.id + '/review-status', type: 'GET' })
                .done(function (res) {
                    $('#historyCard').show();
                    renderGates(res.stages || []);
                    renderArtifacts(res.artifacts || []);
                })
                .fail(function () {
                    $('#historyCard').show();
                    $('#artifactHistory').html('<span class="err">현황 조회 실패</span>');
                });
        }

        function renderGates(stages) {
            var html = stages.map(function (s) {
                var mark = s.passed ? '✔ 통과' : '진행 중';
                var next = s.passed && s.nextStage
                    ? ' → <b>' + escapeHtml(s.nextStage) + '단계 진행 가능</b>' : '';
                return '<span class="gate' + (s.passed ? ' passed' : '') + '">' +
                    escapeHtml(s.label) + '단계: ' + mark + next + '</span>';
            }).join('');
            $('#stageGates').html(html || '<span class="muted">검증 이력이 없습니다.</span>');
        }

        function renderArtifacts(artifacts) {
            if (!artifacts.length) { $('#artifactHistory').empty(); return; }
            var rows = artifacts.map(function (a) {
                var roundCells = (a.rounds || []).map(function (r) {
                    var v = r.passed ? '<span class="ok">통과</span>' : '<span class="err">미통과</span>';
                    return r.round + '회차 ' + v + ' <span class="muted">(대상 ' + r.target +
                        ' · 완료 ' + r.completed + ' · 잔여 ' + r.remaining + ')</span>';
                }).join('<br>');
                var passedAt = a.passedAtRound != null
                    ? '<span class="ok">' + a.passedAtRound + '회차 통과</span>'
                    : '<span class="muted">미통과</span>';
                return '<tr><td>' + escapeHtml(a.label) + '</td><td>' + escapeHtml(a.stage || '') + '</td>' +
                    '<td>' + passedAt + '</td><td>' + roundCells + '</td></tr>';
            }).join('');
            $('#artifactHistory').html(
                '<table><thead><tr><th>산출물</th><th>단계</th><th>통과 회차</th><th>회차별 이력 (대상/완료/잔여)</th></tr></thead><tbody>' +
                rows + '</tbody></table>');
        }

        $('#crossBtn').on('click', function () {
            if (!currentProject) { return; }
            $('#crossResult').html('<span class="muted">검사 중…</span>');
            $.ajax({ url: '/api/projects/' + currentProject.id + '/cross-consistency', type: 'GET' })
                .done(function (res) {
                    if (!res.defectCount) {
                        $('#crossResult').html('<p class="ok">✔ 교차 산출물 정합성 이상 없음</p>');
                        return;
                    }
                    var rows = res.defects.map(function (d) {
                        return '<tr><td><span class="badge ' + escapeHtml(d.severity) + '">' + escapeHtml(d.severity) + '</span></td>' +
                            '<td>' + escapeHtml(d.description) + '</td><td>' + escapeHtml(d.improvementGuide) + '</td></tr>';
                    }).join('');
                    $('#crossResult').html('<table><thead><tr><th>판정</th><th>내용</th><th>개선방향</th></tr></thead><tbody>' + rows + '</tbody></table>');
                })
                .fail(function (xhr) { $('#crossResult').html('<span class="err">교차 검사 실패: ' + errMsg(xhr) + '</span>'); });
        });

        // ── 유틸 ──────────────────────────────────────────────
        function dateOrNull(sel) { var v = $(sel).val(); return v ? v : null; }
        function setBtn(sel, disabled, text) { $(sel).prop('disabled', disabled).text(text); }
        function errMsg(xhr) {
            return escapeHtml((xhr.responseJSON && xhr.responseJSON.message) || '요청 실패');
        }
        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;'); // 속성 컨텍스트 삽입까지 안전하게
        }
    </script>
</body>
</html>
