<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시정조치관리대장 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="action" data-page="corrective-actions">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> 시정조치 <span class="sep">›</span> 시정조치관리대장</div>
    <div class="page-head">
      <div><h1>시정조치관리대장 <span class="pill">PM-342-03</span></h1>
      <p>검증마다 자동 생성 (Excel 3시트: 표지 · 개정이력 · 시정조치서). 프로젝트별로 조회합니다.</p></div>
      <div class="btn-row"><button class="btn sec" data-role="PM,QA" data-role-mode="disable">＋ 개정이력</button><button class="btn" id="excelBtn">Excel 다운로드</button></div>
    </div>

    <!-- 프로젝트 / 필터 -->
    <div class="filterbar">
      <div class="fg"><label>프로젝트</label><select id="projSel" style="max-width:300px"></select></div>
      <div class="fg"><label>단계</label><select id="stageSel"><option value="">전체</option><option>관리</option><option>분석</option><option>설계</option></select></div>
      <div class="fg"><label>회차</label><select id="roundSel"><option value="">전체</option></select></div>
      <div class="fg"><label>검색</label><input type="text" id="q" placeholder="산출물 · 결함내용"></div>
      <div class="spacer"></div>
    </div>

    <div id="detail"></div>

    <div class="note" style="margin-top:14px">구현 주의: 버전·식별번호 등 표시용 컬럼은 셀 서식을 <b>텍스트(String)</b>로 강제 지정하여 저장합니다 (Excel 부동소수점 오차 방지 — 실제 PoC에서 확인).</div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M=window.MOCK, e=M.esc;
    var u=M.currentUser()||{};
    var list=M.visibleProjects();
    var params=new URLSearchParams(location.search);
    var curRows=[];   // 현재 화면에 표시 중인 시정조치 행 (Excel 내보내기용)

    if(!list.length){
      document.getElementById('projSel').innerHTML='<option>담당 프로젝트 없음</option>';
      document.getElementById('detail').innerHTML='<section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">조회할 수 있는 프로젝트가 없습니다.</div></section>';
    } else {
      document.getElementById('projSel').innerHTML=list.map(function(p){
        return '<option value="'+p.id+'">'+e(p.code)+' · '+e(p.name)+'</option>'; }).join('');
      var pid=params.get('projectId');
      var sel=list.filter(function(p){return String(p.id)===String(pid);})[0]||list[0];
      document.getElementById('projSel').value=String(sel.id);
      fillRounds();
      render();
      document.getElementById('projSel').addEventListener('change', function(){
        history.replaceState(null,'','corrective-actions.html?projectId='+this.value); fillRounds(); render(); });
      ['stageSel','roundSel'].forEach(function(id){ document.getElementById(id).addEventListener('change', render); });
      document.getElementById('q').addEventListener('input', render);
    }

    // 회차 드롭다운 — 선택 프로젝트 결함의 회차(distinct)로 채움
    function fillRounds(){
      var p=curProject(); if(!p) return;
      var rounds=[]; M.LEDGER.forEach(function(d){ if(rounds.indexOf(d.round)===-1) rounds.push(d.round); });
      rounds.sort(function(a,b){return a-b;});
      document.getElementById('roundSel').innerHTML='<option value="">전체</option>'
        + rounds.map(function(r){ return '<option value="'+r+'">'+r+'회차</option>'; }).join('');
    }

    function curProject(){
      var id=document.getElementById('projSel').value;
      return list.filter(function(p){return String(p.id)===id;})[0];
    }

    function render(){
      var p=curProject(); if(!p) return;
      var all=M.LEDGER;   // 시정조치관리대장(설계단계) 실 샘플 기준
      // 필터 적용 — 단계 · 회차 · 검색
      var stageF=document.getElementById('stageSel').value;
      var roundF=document.getElementById('roundSel').value;
      var q=(document.getElementById('q').value||'').trim();
      var D=all.filter(function(d){
        if(stageF && d.stage!==stageF) return false;
        if(roundF && String(d.round)!==String(roundF)) return false;
        if(q && (e(d.artifact)+e(d.desc)+e(d.no)).indexOf(q)===-1) return false;
        return true;
      });
      curRows=D;

      var target=all.length, done=all.filter(function(d){return d.status==='DONE';}).length;
      var baseDate=all.reduce(function(m,d){return d.date>m?d.date:m;}, '');

      var html='<div class="kpis">'
        + '<div class="kpi"><div class="k-label">시정조치 대상건수</div><div class="k-value">'+target+'</div></div>'
        + '<div class="kpi ok"><div class="k-label">완료건수</div><div class="k-value">'+done+'</div></div>'
        + '<div class="kpi err"><div class="k-label">잔여건수</div><div class="k-value">'+(target-done)+'</div></div>'
        + '<div class="kpi"><div class="k-label">산출물 기준일</div><div class="k-value" style="font-size:18px">'+(baseDate||'-')+'</div></div>'
        + '</div>';

      html += '<section class="panel"><div class="p-head"><h2>시정조치서 · '+e(p.code)+' <span class="muted" style="font-weight:400">('+D.length+'/'+target+'건)</span></h2></div>'
        + '<div class="p-body flush"><div class="tbl-scroll"><table class="tbl" style="min-width:1500px"><thead>'
        + '<tr><th colspan="11" style="background:#e9eefc;color:#284b8a">■ 부적합사항</th>'
        + '<th colspan="4" style="background:#fdf1e4;color:#8a5a1e">■ 시정조치 계획</th>'
        + '<th colspan="2" style="background:#eaf6ee;color:#1f7a43">■ 시정조치 확인</th></tr>'
        + '<tr><th class="num">No</th><th class="num">업무명</th><th class="num">구분</th><th class="num">검토일</th><th class="num">검토자</th>'
        + '<th>산출물명</th><th>파일명</th><th>부적합 위치</th><th class="num">개선유형</th><th class="num">결함유형</th><th>결함내용</th>'
        + '<th class="num">조치담당자</th><th class="num">완료예정일</th><th class="num">조치완료일</th><th>비고(계획)</th>'
        + '<th class="num">조치확인자</th><th class="num">조치확인일</th></tr></thead><tbody>';
      html += D.length
        ? D.map(function(d){
            return '<tr>'
              +'<td class="num"><b>'+e(d.no)+'</b></td><td class="num">'+e(d.biz)+'</td><td class="num">'+e(d.gubun)+'</td>'
              +'<td class="num muted">'+e(d.date)+'</td><td class="num">'+e(d.reviewer)+'</td>'
              +'<td><b>'+e(d.artifact)+'</b></td><td class="muted wrap-any" style="max-width:220px;min-width:150px">'+e(d.file)+'</td>'
              +'<td>'+e(d.loc)+'</td><td class="num">'+M.sevBadge(d.sev)+'</td><td class="num">'+e(d.dtype)+'</td>'
              +'<td style="max-width:260px">'+e(d.desc)+'</td>'
              +'<td class="num">'+e(d.owner)+'</td><td class="num">'+e(d.due)+'</td>'
              +'<td class="num">'+(d.doneDate?e(d.doneDate):'<span class="muted">-</span>')+'</td>'
              +'<td class="muted">'+e(d.plan)+' '+M.stateHtml(d.status)+'</td>'
              +'<td class="num">'+(d.checker?e(d.checker):'<span class="muted">-</span>')+'</td>'
              +'<td class="num">'+(d.checkDate?e(d.checkDate):'<span class="muted">-</span>')+'</td>'
              +'</tr>';
          }).join('')
        : '<tr><td colspan="17" class="muted" style="text-align:center;padding:24px">'
          + (target===0 ? '이 프로젝트의 시정조치 항목이 없습니다.' : '필터 조건에 맞는 항목이 없습니다.') + '</td></tr>';
      html += '</tbody></table></div></div></section>';

      document.getElementById('detail').innerHTML=html;
      if(window.QAGPT_LAYOUT) window.QAGPT_LAYOUT.applyRoleGates(document.getElementById('detail'));
    }

    // [폴백] 화면 표를 클라이언트에서 .xls(HTML)로 내보낸다. 백엔드 API 미가용 시에만 사용.
    function exportExcel(){
      var p=curProject();
      var cols=['No','업무명','구분','검토일','검토자','산출물명','파일명','부적합 위치','개선유형','결함유형','결함내용',
                '조치담당자','완료예정일','조치완료일','비고(시정조치계획)','조치확인자','조치확인일'];
      var head1='<tr><th colspan="11" style="background:#e9eefc">부적합사항</th>'
        +'<th colspan="4" style="background:#fdf1e4">시정조치 계획</th>'
        +'<th colspan="2" style="background:#eaf6ee">시정조치 확인</th></tr>';
      var head2='<tr>'+cols.map(function(h){ return '<th>'+e(h)+'</th>'; }).join('')+'</tr>';
      var body=(curRows||[]).map(function(d){
        var cells=[d.no,d.biz,d.gubun,d.date,d.reviewer,d.artifact,d.file,d.loc,d.sev,d.dtype,d.desc,
                   d.owner,d.due,d.doneDate,d.plan,d.checker,d.checkDate];
        return '<tr>'+cells.map(function(v){ return '<td>'+e(v==null?'':v)+'</td>'; }).join('')+'</tr>';
      }).join('');
      var title='시정조치관리대장 · '+(p?p.code:'')+' (설계단계)';
      var html='<html><head><meta charset="UTF-8"></head><body>'
        +'<table border="1"><caption>'+e(title)+'</caption>'+head1+head2+body+'</table></body></html>';
      var blob=new Blob(['﻿'+html], {type:'application/vnd.ms-excel;charset=utf-8'});
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='시정조치관리대장_'+(p?p.code:'설계단계')+'.xls';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 0);
    }
    // 선택된 프로젝트(코드 기준)의 검토 회차 중 필터(단계·회차)에 맞는 최신 reviewId를 고른다.
    function pickReviewId(reviews){
      var p=curProject(); if(!p) return null;
      var stageF=document.getElementById('stageSel').value;
      var roundF=document.getElementById('roundSel').value;
      var base=reviews.filter(function(rv){ return rv.projectCode===p.code; });
      var f=base.slice();
      if(stageF) f=f.filter(function(rv){ return rv.stage===stageF; });
      if(roundF) f=f.filter(function(rv){ return String(rv.round)===String(roundF); });
      var pick=(f.length?f:base).slice().sort(function(a,b){ return b.reviewId-a.reviewId; });
      return pick[0] ? pick[0].reviewId : null;
    }

    // 진짜 .xlsx(표지·개정이력·시정조치서 3시트)를 백엔드에서 받아 다운로드한다.
    // API 미가용/해당 리뷰 없음 → 기존 클라이언트 방식(exportExcel)으로 자동 폴백.
    function downloadLedger(){
      var btn=document.getElementById('excelBtn');
      var label=btn ? btn.textContent : '';
      if(btn){ btn.disabled=true; btn.textContent='생성 중…'; }
      var restore=function(){ if(btn){ btn.disabled=false; btn.textContent=label; } };
      fetch('/api/reviews')
        .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
        .then(function(reviews){
          var rid=pickReviewId(reviews);
          if(rid==null) throw new Error('no-review');
          var a=document.createElement('a');
          a.href='/api/reviews/'+rid+'/corrective-action-ledger';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        })
        .catch(function(){ exportExcel(); })   // API 없거나 리뷰 없음 → 폴백
        .then(restore, restore);
    }

    var _xb=document.getElementById('excelBtn');
    if(_xb) _xb.addEventListener('click', downloadLedger);
  </script>
</body>
</html>
