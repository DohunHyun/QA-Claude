<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검증 결과 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="validate" data-page="validation-result">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> AI 검증 <span class="sep">›</span> 검증 결과</div>
    <div class="page-head">
      <div><h1>검증 결과</h1><p>검토 회차를 선택하면 해당 검증의 결함 목록과 생성 결과물을 조회합니다.</p></div>
    </div>

    <div class="filterbar">
      <div class="fg"><label>검토 회차</label><select id="revSel" style="max-width:460px"></select></div>
      <div class="spacer"></div>
      <span class="muted" id="scopeTag"></span>
    </div>

    <div id="detail"><section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">불러오는 중…</div></section></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M = window.MOCK, e = M.esc;
    var params = new URLSearchParams(location.search);
    var REVIEWS = {};   // id → summary

    function fmtDate(iso){ return iso ? iso.replace('T',' ').replace('Z','').slice(0,16) : '-'; }

    // 1) 검토 목록으로 드롭다운 채우기
    fetch('/api/reviews')
      .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
      .then(function(list){
        var sel = document.getElementById('revSel');
        if(!list.length){
          sel.innerHTML = '<option value="">검증 이력 없음</option>';
          document.getElementById('detail').innerHTML =
            '<section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">검증 이력이 없습니다. <a href="validation-upload.html">새 검증 시작 ›</a></div></section>';
          return;
        }
        list.forEach(function(r){ REVIEWS[r.reviewId] = r; });
        sel.innerHTML = list.map(function(r){
          return '<option value="'+r.reviewId+'">#'+r.reviewId+' · '+e(r.artifactLabel||'미분류')
            +' · '+r.round+'회차 · '+fmtDate(r.createdAt)+'</option>';
        }).join('');

        var rid = params.get('reviewId');
        sel.value = (rid && REVIEWS[rid]) ? String(rid) : String(list[0].reviewId);
        sel.addEventListener('change', function(){ renderSelected(); });
        renderSelected();
      })
      .catch(function(err){
        document.getElementById('detail').innerHTML =
          '<section class="panel"><div class="p-body"><span class="err">검토 목록을 불러오지 못했습니다 ('+e(err.message)+').</span></div></section>';
      });

    function renderSelected(){
      var id = document.getElementById('revSel').value;
      var r = REVIEWS[id];
      if(!r) return;
      document.getElementById('detail').innerHTML =
        '<section class="panel"><div class="p-body muted" style="text-align:center;padding:24px">결함 목록 조회 중…</div></section>';
      fetch('/api/reviews/'+id+'/defects')
        .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
        .then(function(defects){ render(r, defects); })
        .catch(function(err){
          document.getElementById('detail').innerHTML =
            '<section class="panel"><div class="p-body"><span class="err">결함 목록을 불러오지 못했습니다 ('+e(err.message)+').</span></div></section>';
        });
    }

    function render(r, defects){
      var running = r.status === 'RUNNING' || r.status === 'PENDING';
      var errCnt = defects.filter(function(d){ return d.severity === '개선'; }).length;
      var warnCnt = defects.filter(function(d){ return d.severity === '권고'; }).length;
      var passed = r.status === 'COMPLETED' && r.passed;
      var verdictBadge = running ? '<span class="state run">검증중</span>'
        : (passed ? '<span class="state done">통과</span>' : '<span class="state fail">미통과</span>');

      var html =
        '<div class="page-head" style="margin-bottom:14px">'
        + '<div><h1 style="font-size:17px">'+e(r.artifactLabel||'미분류')+' <span class="pill">#'+r.reviewId+'</span></h1>'
        + '<p>'+e(r.fileName||'-')+' · '+r.round+'회차 · 검증일 '+fmtDate(r.createdAt)+' · 검토자 AI품질검토봇</p></div>'
        + '<div class="btn-row">'
        + '<a class="btn sec" href="/api/reviews/'+r.reviewId+'/improved-artifact">AI 개선 산출물</a>'
        + '<a class="btn" href="/api/reviews/'+r.reviewId+'/corrective-action-ledger">시정조치관리대장</a></div></div>';

      // KPI
      html += '<div class="kpis">'
        + '<div class="kpi err"><div class="k-label">개선 (ERROR)</div><div class="k-value">'+errCnt+'<small> 건</small></div></div>'
        + '<div class="kpi warn"><div class="k-label">권고 (WARNING)</div><div class="k-value">'+warnCnt+'<small> 건</small></div></div>'
        + '<div class="kpi"><div class="k-label">상태</div><div class="k-value" style="font-size:18px">'+M.stateHtml(r.status)+'</div></div>'
        + '<div class="kpi"><div class="k-label">판정</div><div class="k-value" style="font-size:18px">'+verdictBadge+'</div></div>'
        + '</div>';

      if(running){
        html += '<div class="note">이 검증은 아직 진행 중입니다. 완료 후 결함이 표시됩니다. <a href="validation-progress.html">검토 현황 보기 ›</a></div>';
        document.getElementById('detail').innerHTML = html;
        return;
      }

      // 결함 상세
      if(defects.length === 0){
        html += '<section class="panel"><div class="p-body"><span class="state done" style="font-size:14px">✔ 결함 없음 · 통과</span></div></section>';
      } else {
        html += '<section class="panel"><div class="p-head"><h2>결함 상세</h2>'
          + '<span class="legend"><span>판정: <span class="badge 개선">개선</span> <span class="badge 권고">권고</span></span></span></div>'
          + '<div class="p-body flush"><div class="tbl-scroll"><table class="tbl">'
          + '<thead><tr><th class="num">No</th><th class="num">판정</th><th class="num">결함유형</th><th class="num">관점</th><th>근거위치</th><th>결함내용</th><th>개선방향</th></tr></thead><tbody>';
        html += defects.map(function(d, i){
          return '<tr><td class="num">'+(i+1)+'</td><td class="num">'+M.sevBadge(d.severity)+'</td>'
            + '<td class="num">'+e(d.defectType)+'</td><td class="num"><span class="pill g">'+e(d.perspective)+'</span></td>'
            + '<td>'+e(d.location)+'</td><td>'+e(d.description)+'</td><td class="muted">'+e(d.improvementGuide)+'</td></tr>';
        }).join('');
        html += '</tbody></table></div></div></section>';
      }

      // 생성 결과물
      html += '<section class="panel"><div class="p-head"><h2>생성 결과물</h2></div><div class="p-body"><ul class="dl-list">'
        + '<li><span class="ico">XLSX</span><div class="meta"><b>AI 개선 산출물</b><div>원본 포맷 유지 · 수정 위치 [개선] 태그</div></div><a class="btn sm sec" href="/api/reviews/'+r.reviewId+'/improved-artifact">다운로드</a></li>'
        + '<li><span class="ico">XLSX</span><div class="meta"><b>시정조치관리대장</b><div>표지·개정이력·시정조치서 3시트</div></div><a class="btn sm sec" href="/api/reviews/'+r.reviewId+'/corrective-action-ledger">다운로드</a></li>'
        + '<li><span class="ico">HWPX</span><div class="meta"><b>단계말 검토결과서</b><div>QA 승인 후 발급 가능</div></div><a class="btn sm sec" href="/api/reviews/'+r.reviewId+'/review-report">발급</a></li>'
        + '</ul></div></section>';

      document.getElementById('detail').innerHTML = html;
    }
  </script>
</body>
</html>
