<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>산출물 업로드 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="validate" data-page="validation-upload">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> AI 검증 <span class="sep">›</span> 단계별 검증</div>
    <div class="page-head">
      <div><h1>산출물 업로드 · 검증</h1>
      <p>HWPX · Excel · PPTX 혼합 다중 업로드 → AI가 유형을 자동 인식하고 체크리스트 기반 검증을 수행합니다.</p></div>
    </div>

    <div class="note" id="stageGuide" style="display:none;margin-bottom:14px;"></div>

    <!-- 프로젝트 선택 -->
    <section class="panel">
      <div class="p-head"><h2>1. 대상 프로젝트</h2><span class="more" id="projTag"></span></div>
      <div class="p-body inline">
        <label class="soft" style="font-weight:700">프로젝트</label>
        <select id="projSel" style="max-width:360px"></select>
      </div>
    </section>

    <!-- 업로드 -->
    <section class="panel">
      <div class="p-head"><h2>2. 산출물 업로드</h2><span class="more">.hwpx · .xlsx · .pptx</span></div>
      <div class="p-body">
        <form id="uploadForm">
          <div class="drop" id="drop">
            <div class="big">파일을 이곳에 끌어다 놓거나 클릭하여 선택</div>
            <div class="sub">한 번에 여러 파일 동시 업로드 지원 · 최대 50MB/파일</div>
          </div>
          <!-- input은 #drop 밖에 둬야 click() 재버블링(무한 재귀) 방지 -->
          <input type="file" id="file" accept=".xlsx,.hwpx,.pptx" multiple style="display:none">
          <div class="inline" style="margin-top:12px">
            <div style="margin-left:auto"><button class="btn" type="submit" id="submitBtn" data-role="PM" data-role-mode="disable">검증 실행</button></div>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M = window.MOCK, e = M.esc;
    var params = new URLSearchParams(location.search);
    var stage = params.get('stage');                 // MANAGEMENT / ANALYSIS / DESIGN
    var STAGE_KR = { MANAGEMENT:'관리', ANALYSIS:'분석', DESIGN:'설계' };
    var stageKr = STAGE_KR[stage] || null;

    // 프로젝트 목록 초기화 — id는 반드시 백엔드 실제 프로젝트 id를 써야
    // 업로드 시 doc.project 가 연결되어 검토 현황에 프로젝트가 표시된다(미지정 방지).
    function initProjects(projList){
      var noApproved = projList.length === 0;
      $('#projSel').html(noApproved
        ? '<option value="">검증 가능한(승인된) 프로젝트 없음</option>'
        : projList.map(function(p){ return '<option value="'+p.id+'">'+e(p.code)+' · '+e(p.name)+'</option>'; }).join(''));

      if (noApproved) {
        $('#stageGuide').html(
          '⛔ <b>승인된 프로젝트가 없습니다.</b> 산출물 검증은 <b>관리자 승인</b>이 완료된 프로젝트에서만 가능합니다. '
          + '<a href="projects.html">프로젝트 목록</a>에서 상태를 확인하세요.'
        ).show();
        $('#submitBtn').prop('disabled', true);
        $('#drop').css({opacity:.5, pointerEvents:'none'});
      }

      var pidParam = params.get('projectId');
      if (pidParam && !noApproved) {
        var hit = projList.filter(function(p){ return String(p.id) === String(pidParam); })[0];
        if (hit) $('#projSel').val(String(hit.id));
      }

      if (stageKr && !noApproved) {
        $('#projTag').html('<span class="pill">'+e(stageKr)+'단계</span>');
        $('#stageGuide').html(
          '<b>'+e(stageKr)+'산출물</b> 업로드 단계입니다. 업로드한 파일은 '+e(stageKr)+'단계 산출물로 자동 인식·검증됩니다.'
        ).show();
      }
    }

    // 실 API(/api/projects) 우선 → 실패 시 목업 폴백
    $.getJSON('/api/projects')
      .done(function(list){
        var act = (list||[]).filter(function(p){ return p.status==='ACTIVE' || p.status==='APPROVED'; })
                            .map(function(p){ return { id:p.id, code:p.code, name:p.name }; });
        initProjects(act.length ? act : M.validatableProjects());
      })
      .fail(function(){ initProjects(M.validatableProjects()); });

    // 드랍존 — 선택 파일을 드롭존 안에 표시
    var $file = $('#file');
    var DROP_DEFAULT =
      '<div class="big">파일을 이곳에 끌어다 놓거나 클릭하여 선택</div>'
      + '<div class="sub">한 번에 여러 파일 동시 업로드 지원 · 최대 50MB/파일</div>';
    $('#drop').on('click', function(){ $file.click(); })
      .on('dragover', function(ev){ ev.preventDefault(); $(this).addClass('hot'); })
      .on('dragleave', function(){ $(this).removeClass('hot'); })
      .on('drop', function(ev){ ev.preventDefault(); $(this).removeClass('hot');
        $file[0].files = ev.originalEvent.dataTransfer.files; showFile(); });
    $file.on('change', showFile);
    function showFile(){
      var fs = Array.prototype.slice.call($file[0].files);
      if(!fs.length){ $('#drop').html(DROP_DEFAULT); return; }
      var items = fs.map(function(f){
        return '<div class="drop-file">📄 <b>'+e(f.name)+'</b> <span class="muted">('+Math.round(f.size/1024)+' KB)</span></div>';
      }).join('');
      $('#drop').html(
        '<div class="big">선택된 파일 '+fs.length+'개</div>'
        + '<div style="margin:8px 0 6px;text-align:left;display:inline-block">'+items+'</div>'
        + '<div class="sub">다시 클릭하거나 끌어다 놓으면 재선택</div>');
    }

    // 검증 실행 — 1개면 /api/validate, 2개 이상이면 /api/validate-batch (파일별 자동 인식)
    // 업로드는 백그라운드로 던지고(응답 대기 X) 즉시 안내 alert → 검증 현황으로 이동.
    // 진행 중 표시는 검증 현황에서 클라이언트 시뮬레이션(Phase 애니메이션)으로 보여주고,
    // 완료·판정은 /api/reviews 실제 결과가 도착할 때만 확정한다.
    $('#uploadForm').on('submit', function(ev){
      ev.preventDefault();
      var fs = Array.prototype.slice.call($file[0].files);
      if(!fs.length){ alert('파일을 선택하세요.'); return; }

      var pid = $('#projSel').val();
      var optText = $('#projSel option:selected').text();   // "CODE · Name"
      var sepIdx = optText.indexOf(' · ');
      var pcode = sepIdx >= 0 ? optText.slice(0, sepIdx) : optText;
      var pname = sepIdx >= 0 ? optText.slice(sepIdx + 3) : optText;
      var fileNames = fs.map(function(f){ return f.name; });
      var url = fs.length === 1 ? '/api/validate' : '/api/validate-batch';

      // 완료 매칭 기준선(baseline)은 반드시 업로드 '이전'의 최대 reviewId 여야 한다.
      //   /api/validate는 동기(검증 완료 후 응답)라, 업로드를 먼저 던지고 alert이 뜬 사이
      //   빠른 '통과' 케이스가 끝나 새 리뷰가 생기면, 그 뒤 baseline을 읽을 때 baseline==새 id
      //   가 되어 매칭에 실패(99% 무한대기)한다. → baseline을 업로드 발사 전에 확보한다.
      function start(baseline){
        var fd = new FormData();
        if(pid) fd.append('projectId', pid);
        if(fs.length === 1){ fd.append('file', fs[0]); }
        else { fs.forEach(function(f){ fd.append('files', f); }); }
        $.ajax({ url:url, type:'POST', data:fd, processData:false, contentType:false });  // 백그라운드

        var now = Date.now();
        fileNames.forEach(function(fn){
          M.addPendingReview({ projectId: pid || null, projectCode: pcode, projectName: pname,
            stage: stageKr || '-', fileName: fn, round: 1, startedAt: now, baselineMaxReviewId: baseline });
        });
        alert('검증을 시작합니다. 검증 현황에서 진행 상태를 확인하세요.');
        location.href = 'validation-progress.html?projectId=' + encodeURIComponent(pid || '')
          + '&code=' + encodeURIComponent(pcode);
      }

      // baseline을 먼저 읽고(업로드 발사 이전) → 업로드 + 대기행 등록 + 이동.
      $.getJSON('/api/reviews')
        .done(function(list){ start((list||[]).reduce(function(m, r){ return Math.max(m, r.reviewId||0); }, 0)); })
        .fail(function(){ start(0); });
    });
  </script>
</body>
</html>
