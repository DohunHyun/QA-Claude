<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단계말 검토결과서 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="report" data-page="review-report">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> 검토결과서 <span class="sep">›</span> 단계말 검토결과서</div>
    <div class="page-head">
      <div><h1>단계말 검토결과서</h1><p>프로젝트·단계별 최종 검토 요약과 QA 승인. (HWPX 발급 · 고객사 제출용)</p></div>
    </div>

    <!-- 실제 검토 결과 기반 QA 승인·발급 (백엔드 연동 · 미연동 시 아래 목업만 표시) -->
    <div id="realBar"></div>

    <!-- 프로젝트 / 단계 선택 -->
    <div class="filterbar">
      <div class="fg"><label>프로젝트</label><select id="projSel" style="max-width:300px"></select></div>
      <div class="fg"><label>단계</label><select id="stageSel"><option value="분석/설계">분석/설계</option><option value="테스트/이행">테스트/이행</option></select></div>
      <div class="spacer"></div>
      <span class="muted" id="scopeTag"></span>
    </div>

    <div id="detail"></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M=window.MOCK, e=M.esc;
    var u=M.currentUser()||{};
    var list=M.visibleProjects();
    var params=new URLSearchParams(location.search);
    // 단계 그룹 — 검토결과서는 분석/설계, 테스트/이행 2개 그룹으로 표기
    var STAGE_GROUPS = { '분석/설계':['분석','설계'], '테스트/이행':['테스트','이행'] };

    document.getElementById('scopeTag').innerHTML=(u.role==='PM')
      ? '<span class="pill g">내 프로젝트</span>' : '<span class="pill g">전체 프로젝트</span>';

    if(!list.length){
      document.getElementById('projSel').innerHTML='<option>담당 프로젝트 없음</option>';
      document.getElementById('detail').innerHTML='<section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">조회할 수 있는 프로젝트가 없습니다.</div></section>';
    } else {
      document.getElementById('projSel').innerHTML=list.map(function(p){
        return '<option value="'+p.id+'">'+e(p.code)+' · '+e(p.name)+'</option>'; }).join('');
      var pid=params.get('projectId');
      var sel=list.filter(function(p){return String(p.id)===String(pid);})[0]||list[0];
      document.getElementById('projSel').value=String(sel.id);
      render();
      document.getElementById('projSel').addEventListener('change', render);
      document.getElementById('stageSel').addEventListener('change', render);
    }

    function curProject(){
      var id=document.getElementById('projSel').value;
      return list.filter(function(p){return String(p.id)===id;})[0];
    }
    function groupStages(g){ return STAGE_GROUPS[g] || [g]; }
    function stageArtifacts(g){
      var sts=groupStages(g);
      return M.ARTIFACTS.filter(function(a){return sts.indexOf(a.stage)!==-1;}).map(function(a){return a.name;});
    }

    function render(){
      var p=curProject(); if(!p) return;
      var stage=document.getElementById('stageSel').value;
      var sts=groupStages(stage);
      var revs=M.REVIEWS.filter(function(r){return r.project===p.code && sts.indexOf(r.stage)!==-1;});
      var completed=revs.filter(function(r){return r.status==='COMPLETED';});
      var byArt={}; revs.forEach(function(r){ if(!byArt[r.code]||r.round>byArt[r.code].round) byArt[r.code]=r; });
      var arts=Object.keys(byArt).map(function(k){return byArt[k];});
      var errSum=completed.reduce(function(a,r){return a+(r.error||0);},0);
      var warnSum=completed.reduce(function(a,r){return a+(r.warn||0);},0);
      var cumRounds=revs.length;   // 누적 검토회차 (해당 단계그룹 검증 실행 총합)
      var stageArts=stageArtifacts(stage);
      var defs=M.defectsFor(p.code).filter(function(d){return stageArts.indexOf(d.artifact)!==-1;});
      var issued = M.issuedReport(p.id, stage);
      var canApprove = !issued && arts.length>0 && errSum===0;

      // ── 검토 개요 (단계 정보 · 누적 검토회차 · 누적 개선/권고) ──
      var html='<section class="panel"><div class="p-head"><h2>검토 개요 · '+e(p.name)+'</h2>'
        + '<span class="more">'+(issued ? '<span class="state done">발급 완료</span> <span class="muted">'+e(issued.by)+' · '+e(issued.at)+'</span>'
              : arts.length===0 ? '<span class="state wait">검토 이력 없음</span>'
              : (canApprove ? '<span class="state done">QA 승인 가능</span>' : '<span class="state hold">개선 조치 필요</span>'))+'</span></div>'
        + '<div class="p-body"><div class="kpis" style="margin-bottom:0">'
        +   '<div class="kpi"><div class="k-label">단계 정보</div><div class="k-value" style="font-size:18px">'+e(stage)+'</div><div class="muted" style="font-size:11px;margin-top:2px">'+e(p.code)+' · 산출물 '+arts.length+'종</div></div>'
        +   '<div class="kpi"><div class="k-label">누적 검토회차</div><div class="k-value">'+cumRounds+'<small> 회</small></div></div>'
        +   '<div class="kpi err"><div class="k-label">누적 개선</div><div class="k-value">'+errSum+'<small> 건</small></div></div>'
        +   '<div class="kpi warn"><div class="k-label">누적 권고</div><div class="k-value">'+warnSum+'<small> 건</small></div></div>'
        + '</div></div></section>';

      // ── 검토 항목 (산출물 · 단계 · 결과 · 내용) ──
      html+='<section class="panel"><div class="p-head"><h2>검토 항목</h2>'
        + '<span class="more">'+arts.length+'개 산출물</span></div>'
        + '<div class="p-body flush"><table class="tbl">'
        + '<thead><tr><th style="width:150px">산출물</th><th class="num" style="width:70px">단계</th><th class="num" style="width:70px">결과</th><th>내용</th></tr></thead><tbody>';
      var rows='';
      arts.forEach(function(r){
        var ds=defs.filter(function(d){return d.artifact===r.artifact;});
        if(r.status==='COMPLETED' && r.passed && !ds.length){
          rows+='<tr><td><b>'+e(r.artifact)+'</b></td><td class="num"><span class="pill g">'+e(r.stage)+'</span></td><td class="num"><span class="badge OK">OK</span></td>'
            +'<td class="muted">필수항목·정합성 검증 통과</td></tr>';
        } else if(ds.length){
          ds.forEach(function(d){
            rows+='<tr><td><b>'+e(r.artifact)+'</b></td><td class="num"><span class="pill g">'+e(r.stage)+'</span></td><td class="num">'+M.sevBadge(d.sev)+'</td>'
              +'<td>'+e(d.desc)+'</td></tr>';
          });
        } else {
          rows+='<tr><td><b>'+e(r.artifact)+'</b></td><td class="num"><span class="pill g">'+e(r.stage)+'</span></td><td class="num">'+M.sevBadge(r.error>0?'개선':'권고')+'</td>'
            +'<td>개선 '+(r.error||0)+' · 권고 '+(r.warn||0)+' <span class="muted">(상세는 시정조치대장)</span></td></tr>';
        }
      });
      html+= (rows || '<tr><td colspan="4" class="muted" style="text-align:center;padding:22px">해당 단계 검토 결과가 없습니다.</td></tr>');
      html+='</tbody></table></div></section>';

      // ── 결과물 + QA 승인 (최종 등재 산출물 · 검토 결과서) ──
      html+='<section class="panel"><div class="p-head"><h2>결과물 · QA 승인</h2></div><div class="p-body">'
        + '<div class="btn-row" style="margin-bottom:12px">'
        +   '<a class="btn sec" href="#">최종 등재 산출물</a>'
        +   '<a class="btn sec" href="#">검토 결과서</a>'
        + '</div>'
        + '<div class="inline" style="gap:14px;border-top:1px solid var(--line);padding-top:12px">'
        +   '<label class="soft" style="font-weight:700">QA 검증자</label>'
        +   '<input type="text" id="qaName" placeholder="담당자명" style="max-width:180px"'
        +      (issued ? ' value="'+e(issued.by)+'" disabled' : '') + '>'
        +   '<div style="margin-left:auto">'
        +     '<button class="btn warn" id="approveBtn" data-role="QA" data-role-mode="disable"'+(canApprove?'':' disabled')+'>'
        +        (issued ? '발급 완료 ('+e(issued.at)+')'
                 : canApprove ? '승인 및 결과서 발급' : '개선 항목 미해결 — 승인 불가')+'</button>'
        +   '</div>'
        + '</div></div></section>';

      document.getElementById('detail').innerHTML=html;
      if(window.QAGPT_LAYOUT) window.QAGPT_LAYOUT.applyRoleGates(document.getElementById('detail'));
    }

    // 승인 및 결과서 발급 (재렌더마다 버튼이 새로 생기므로 위임 바인딩)
    document.getElementById('detail').addEventListener('click', function(ev){
      var btn = ev.target.closest('#approveBtn');
      if(!btn || btn.disabled) return;
      var p = curProject(); if(!p) return;
      var stage = document.getElementById('stageSel').value;
      var name = (document.getElementById('qaName').value || '').trim() || (u.name || 'QA');
      if(!confirm('['+p.code+'] '+stage+'단계 검토결과서를 승인·발급하시겠습니까?\nQA 검증자: '+name)) return;
      M.issueReport(p, stage, name);
      render();
      if (window.QAGPT_BELL) window.QAGPT_BELL.refresh();
    });
  </script>
  <script>
    // 실 API 연동: 검토 목록 선택 → QA 승인(POST) → 검토결과서(HWPX) 발급.
    // 백엔드 미연동/무이력 시 이 바는 숨고 아래 목업이 그대로 표시된다.
    (function(){
      var box=document.getElementById('realBar');
      var pre=new URLSearchParams(location.search).get('reviewId');
      fetch('/api/reviews')
        .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
        .then(function(list){
          if(!list.length) return;
          box.innerHTML='<section class="panel" style="border:1.5px solid #284b8a55">'
            +'<div class="p-head"><h2>실제 단계말 검토결과서 발급</h2><span class="more">QA 승인 후 HWPX(.hwpx)</span></div>'
            +'<div class="p-body">'
            +'<div class="inline" style="gap:12px">'
            +'<label class="soft" style="font-weight:700">검토 회차</label>'
            +'<select id="realRev" style="max-width:460px">'
            + list.map(function(x){ return '<option value="'+x.reviewId+'">#'+x.reviewId+' · '+M.esc(x.artifactLabel||'미분류')+' · '+(x.passed?'통과':'미통과')+' · 결함 '+x.defectCount+'건</option>'; }).join('')
            +'</select>'
            +'<button class="btn warn" id="realApprove" style="margin-left:auto">QA 승인</button>'
            +'<a class="btn" id="realIssue">검토결과서 발급 (HWPX)</a>'
            +'</div>'
            +'<div id="realMsg" class="muted" style="margin-top:8px">먼저 <b>QA 승인</b> 후 <b>발급</b> 버튼으로 HWPX를 내려받습니다.</div>'
            +'</div></section>';
          var sel=document.getElementById('realRev');
          if(pre && list.some(function(x){return String(x.reviewId)===String(pre);})) sel.value=pre;
          function sync(){ document.getElementById('realIssue').href='/api/reviews/'+sel.value+'/review-report'; }
          sel.addEventListener('change', sync); sync();
          document.getElementById('realApprove').addEventListener('click', function(){
            var id=sel.value;
            if(!confirm('검토 #'+id+' 를 QA 승인하시겠습니까?\n(개선 항목 잔존 시 QA 예외 승인으로 처리됩니다.)')) return;
            var msg=document.getElementById('realMsg'); msg.textContent='승인 처리 중…';
            fetch('/api/reviews/'+id+'/approve?exception=true', { method:'POST' })
              .then(function(res){ return res.json().then(function(j){ return { ok:res.ok, j:j }; }); })
              .then(function(r){ msg.innerHTML = r.ok
                ? '<span class="state done">승인 완료</span> 이제 \'검토결과서 발급\' 버튼으로 HWPX를 내려받을 수 있습니다.'
                : '<span class="err">승인 실패: '+M.esc(r.j.message||'')+'</span>'; })
              .catch(function(err){ msg.innerHTML='<span class="err">승인 오류: '+M.esc(err.message)+'</span>'; });
          });
        })
        .catch(function(){ /* 백엔드 미연동 — 목업만 표시 */ });
    })();
  </script>
</body>
</html>
