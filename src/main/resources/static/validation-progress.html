<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검증 현황 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="validate" data-page="validation-progress">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> AI 검증 <span class="sep">›</span> 검증 현황</div>
    <div class="page-head">
      <div><h1>검증 현황</h1><p>프로젝트의 진행 중·완료된 검증 회차와 4-Phase 진행 상태를 확인합니다.</p></div>
      <div class="btn-row">
        <button class="btn" id="reqReportBtn" data-role="PM,QA" data-role-mode="disable" disabled>검토결과서 요청</button>
        <a class="btn sec" href="validation-upload.html">＋ 새 검증</a>
      </div>
    </div>

    <!-- 프로젝트 / 단계 선택 -->
    <div class="filterbar">
      <div class="fg"><label>프로젝트</label><select id="projSel" style="max-width:360px"></select></div>
      <div class="fg"><label>단계</label><select id="stageSel"><option value="">전체</option><option>관리</option><option>분석</option><option>설계</option></select></div>
      <div class="spacer"></div>
      <button class="btn sm sec" id="refreshBtn">↻ 새로고침</button>
    </div>

    <div id="detail"><section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">불러오는 중…</div></section></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M = window.MOCK, e = M.esc;
    var u = M.currentUser() || {};
    var params = new URLSearchParams(location.search);
    var ALL = [];   // 정규화된 검토 목록(프로젝트·단계 포함)

    var PNAME = {}; M.PROJECTS.forEach(function(p){ PNAME[p.code]=p.name; });

    function fmtDate(iso){ return iso ? String(iso).replace('T',' ').replace('Z','').slice(0,16) : '-'; }
    function stageOf(type){ var a=M.ARTIFACTS.filter(function(x){return x.type===type;})[0]; return a?a.stage:'-'; }
    function normApi(r){
      return { reviewId:r.reviewId, artifactLabel:r.artifactLabel||'미분류', fileName:r.fileName,
        projectCode:r.projectCode||'미지정', projectName:r.projectName||'미지정 프로젝트',
        stage:r.stage||stageOf(r.artifactType), round:r.round, status:r.status, passed:r.passed,
        defectCount:r.defectCount, createdAt:r.createdAt };
    }
    function normMock(r){
      return { reviewId:r.id, artifactLabel:r.artifact, fileName:'', projectCode:r.project,
        projectName:PNAME[r.project]||r.project, stage:r.stage, round:r.round, status:r.status,
        passed:r.passed, defectCount:(r.error||0)+(r.warn||0), createdAt:r.date };
    }
    function verdict(r){
      if(r.status==='COMPLETED') return r.passed ? '<span class="state done">통과</span>' : '<span class="state fail">미통과</span>';
      return '<span class="muted">-</span>';
    }
    function projList(){
      var seen={}, out=[];
      // 실제 프로젝트 전체를 먼저 노출 (검토 이력 0건이어도 선택 가능)
      M.PROJECTS.forEach(function(p){ if(!seen[p.code]){ seen[p.code]=1; out.push({code:p.code, name:p.name}); } });
      // 이력에만 존재하는 코드(프로젝트 미연결 → '미지정' 등)를 뒤에 추가
      ALL.forEach(function(r){ if(!seen[r.projectCode]){ seen[r.projectCode]=1; out.push({code:r.projectCode, name:r.projectName}); } });
      return out;
    }
    function curCode(){ return document.getElementById('projSel').value; }

    function render(){
      var code=curCode();
      var stageF=document.getElementById('stageSel').value;
      var revs=ALL.filter(function(r){ return r.projectCode===code && (!stageF || r.stage===stageF); })
                  .slice().sort(function(a,b){ return b.reviewId-a.reviewId; });
      var running=revs.filter(function(r){ return r.status==='RUNNING'||r.status==='PENDING'; });

      var html='';
      if(running.length){
        html += running.map(function(r){
          return '<section class="panel"><div class="p-body">'
            +'<div class="steps">'
            +'<div class="st done"><span class="n">✓</span>Phase1 표준 보증</div>'
            +'<div class="st done"><span class="n">✓</span>Phase2 요구사항 품질</div>'
            +'<div class="st cur"><span class="n">3</span>Phase3 정합성 체크</div>'
            +'<div class="st"><span class="n">4</span>Phase4 결과물 생성</div></div>'
            +'<div class="progress" style="margin-top:12px"><span style="width:62%"></span></div>'
            +'<div class="muted" style="margin-top:8px">표준·요구사항 품질 검증 완료 → 정합성 검사 중…</div>'
            +'</div></section>';
        }).join('');
      } else {
        html += '<div class="note" style="margin-bottom:14px">현재 <b>'+e(PNAME[code]||code)+'</b>에 진행 중인 검증이 없습니다.</div>';
      }

      // 검증 큐 / 이력 — 단계 컬럼 포함
      html += '<section class="panel"><div class="p-head"><h2>검증 큐 / 최근 이력 · '+e(code)+'</h2>'
        +'<span class="more">'+revs.length+'건</span></div><div class="p-body flush"><div class="tbl-scroll"><table class="tbl">'
        +'<thead><tr><th class="num">검토ID</th><th class="num">단계</th><th>산출물</th><th>파일명</th><th class="num">회차</th><th style="width:160px">진행</th><th class="num">상태</th><th class="num">판정</th><th class="num">검증일</th></tr></thead><tbody>';
      html += revs.length
        ? revs.map(function(r){
            var pct=(r.status==='RUNNING'||r.status==='PENDING')?62:(r.status==='COMPLETED'?100:0);
            return '<tr onclick="location.href=\'validation-result.html?reviewId='+r.reviewId+'\'" style="cursor:pointer">'
              +'<td class="num">#'+r.reviewId+'</td><td class="num"><span class="pill g">'+e(r.stage)+'</span></td>'
              +'<td><b>'+e(r.artifactLabel)+'</b></td><td class="muted wrap-any">'+e(r.fileName||'-')+'</td>'
              +'<td class="num">'+r.round+'회차</td>'
              +'<td><div class="progress"><span style="width:'+pct+'%"></span></div></td>'
              +'<td class="num">'+M.stateHtml(r.status)+'</td><td class="num">'+verdict(r)+'</td>'
              +'<td class="num muted">'+fmtDate(r.createdAt)+'</td></tr>';
          }).join('')
        : '<tr><td colspan="9" class="muted" style="text-align:center;padding:22px">검증 이력이 없습니다.</td></tr>';
      html += '</tbody></table></div></div></section>';

      document.getElementById('detail').innerHTML=html;
      updateReportBtn(code);
    }

    // 단계 완료 = 해당 프로젝트·단계 이력 존재 + RUNNING/PENDING 없음
    function stageDone(code, st){
      var rs=ALL.filter(function(r){ return r.projectCode===code && r.stage===st; });
      return rs.length>0 && !rs.some(function(r){ return r.status==='RUNNING'||r.status==='PENDING'; });
    }
    function updateReportBtn(code){
      var btn=document.getElementById('reqReportBtn');
      var allDone=['관리','분석','설계'].every(function(st){ return stageDone(code, st); });
      btn.disabled=!allDone;
      btn.title=allDone?'':'관리·분석·설계 단계가 모두 완료되어야 요청할 수 있습니다.';
      btn.onclick=allDone?function(){
        if(!confirm('['+code+'] 검토결과서를 요청하시겠습니까?\nQA 승인 후 발급됩니다.')) return;
        M.addNotification({ to:(u.name||'QA'), type:'report', title:'검토결과서 요청 접수',
          message:'['+code+'] '+(PNAME[code]||code)+' 검토결과서 발급 요청이 접수되었습니다.',
          projectCode:code, by:(u.name||'PM'), at:new Date().toISOString().slice(0,10) });
        if(window.QAGPT_BELL) window.QAGPT_BELL.refresh();
        alert('검토결과서를 요청했습니다. 이후 진행은 알림으로 안내됩니다.');
      }:null;
      if(window.QAGPT_LAYOUT) window.QAGPT_LAYOUT.applyRoleGates(document.querySelector('.page-head'));
    }

    function fillProjects(preferCode){
      var ps=projList();
      var sel=document.getElementById('projSel');
      if(!ps.length){ sel.innerHTML='<option value="">검토 이력 없음</option>'; return false; }
      sel.innerHTML=ps.map(function(p){ return '<option value="'+e(p.code)+'">'+e(p.code)+' · '+e(p.name)+'</option>'; }).join('');
      if(preferCode && ps.some(function(p){return p.code===preferCode;})) sel.value=preferCode;
      return true;
    }

    // 실 API 우선 → 실패 시 목업 폴백
    function load(){
      fetch('/api/reviews')
        .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
        .then(function(list){ ALL=list.map(normApi); afterLoad(); })
        .catch(function(){ ALL=M.REVIEWS.map(normMock); afterLoad(); });
    }
    function afterLoad(){
      // ?reviewId 로 진입 시 그 프로젝트 우선 선택
      var pref=null, rid=params.get('reviewId'), pid=params.get('projectId');
      if(rid){ var rv=ALL.filter(function(r){return String(r.reviewId)===String(rid);})[0]; if(rv) pref=rv.projectCode; }
      if(!pref && pid){ var pj=M.PROJECTS.filter(function(p){return String(p.id)===String(pid);})[0]; if(pj) pref=pj.code; }
      // 지정된 우선순위가 없으면 검토 이력이 있는 프로젝트를 기본 선택 (빈 화면 방지)
      if(!pref && ALL.length) pref=ALL[0].projectCode;
      if(!fillProjects(pref)){
        document.getElementById('detail').innerHTML='<section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">검증 이력이 없습니다. <a href="validation-upload.html">새 검증 시작 ›</a></div></section>';
        return;
      }
      render();
    }

    document.getElementById('projSel').addEventListener('change', render);
    document.getElementById('stageSel').addEventListener('change', render);
    document.getElementById('refreshBtn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
