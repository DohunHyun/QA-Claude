<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검토 현황 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="validate" data-page="validation-progress">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> AI 검증 <span class="sep">›</span> 검토 현황</div>
    <div class="page-head">
      <div><h1>검토 현황</h1><p>업로드된 산출물의 검증 회차 상태(진행 중·완료·통과 여부)를 실시간으로 확인합니다.</p></div>
      <div class="btn-row">
        <button class="btn" id="reqReportBtn" data-role="PM,QA" data-role-mode="disable" disabled>검토결과서 요청</button>
        <a class="btn sec" href="validation-upload.html">＋ 새 검증</a>
      </div>
    </div>

    <div class="filterbar">
      <div class="fg"><label>단계</label><select id="stageSel"><option value="">전체</option><option>관리</option><option>분석</option><option>설계</option></select></div>
      <div class="spacer"></div>
      <button class="btn sm sec" id="refreshBtn">↻ 새로고침</button>
      <span class="muted" id="scopeTag"></span>
    </div>

    <div id="detail"><section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">불러오는 중…</div></section></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M = window.MOCK, e = M.esc;
    var u = M.currentUser() || {};
    var ALL = [];   // 정규화된 검토 목록

    function fmtDate(iso){
      if(!iso) return '-';
      return String(iso).replace('T', ' ').replace('Z', '').slice(0, 16);
    }
    // artifactType(enum명) → 단계. 목업은 stage를 직접 보유.
    function stageOf(type){
      var a = M.ARTIFACTS.filter(function(x){ return x.type===type; })[0];
      return a ? a.stage : '-';
    }
    function normApi(r){
      return { reviewId:r.reviewId, artifactLabel:r.artifactLabel||'미분류', fileName:r.fileName,
        round:r.round, status:r.status, passed:r.passed, defectCount:r.defectCount,
        createdAt:r.createdAt, stage:stageOf(r.artifactType) };
    }
    function normMock(r){
      return { reviewId:r.id, artifactLabel:r.artifact, fileName:'', round:r.round, status:r.status,
        passed:r.passed, defectCount:(r.error||0)+(r.warn||0), createdAt:r.date, stage:r.stage };
    }
    function verdict(r){
      if(r.status==='COMPLETED') return r.passed ? '<span class="state done">통과</span>' : '<span class="state fail">미통과</span>';
      return '<span class="muted">-</span>';
    }

    function render(){
      var stageF = document.getElementById('stageSel').value;
      var reviews = ALL.filter(function(r){ return !stageF || r.stage===stageF; });
      var running = reviews.filter(function(r){ return r.status==='RUNNING'||r.status==='PENDING'; });
      var html = '';
      if(running.length){
        html += '<div class="note" style="margin-bottom:14px">🔄 진행 중인 검증 <b>'+running.length+'</b>건이 있습니다. 완료되면 아래 목록에서 결과를 확인하세요.</div>';
      }

      // 검증 큐 / 목록 — 단계 컬럼 포함
      html += '<section class="panel"><div class="p-head"><h2>검증 회차 목록</h2><span class="more">'+reviews.length+'건</span></div>'
        + '<div class="p-body flush"><div class="tbl-scroll"><table class="tbl">'
        + '<thead><tr><th class="num">검토ID</th><th class="num">단계</th><th>산출물</th><th>파일명</th>'
        + '<th class="num">회차</th><th class="num">상태</th><th class="num">판정</th><th class="num">결함</th><th class="num">검증일</th></tr></thead><tbody>';
      html += reviews.length
        ? reviews.map(function(r){
            return '<tr onclick="location.href=\'validation-result.html?reviewId='+r.reviewId+'\'" style="cursor:pointer">'
              +'<td class="num">#'+r.reviewId+'</td>'
              +'<td class="num"><span class="pill g">'+e(r.stage)+'</span></td>'
              +'<td><b>'+e(r.artifactLabel)+'</b></td>'
              +'<td class="muted wrap-any">'+e(r.fileName||'-')+'</td>'
              +'<td class="num">'+r.round+'회차</td>'
              +'<td class="num">'+M.stateHtml(r.status)+'</td>'
              +'<td class="num">'+verdict(r)+'</td>'
              +'<td class="num">'+r.defectCount+'건</td>'
              +'<td class="num muted">'+fmtDate(r.createdAt)+'</td></tr>';
          }).join('')
        : '<tr><td colspan="9" class="muted" style="text-align:center;padding:22px">검증 이력이 없습니다. <a href="validation-upload.html">새 검증 시작 ›</a></td></tr>';
      html += '</tbody></table></div></div></section>';
      document.getElementById('detail').innerHTML = html;

      updateReportBtn();
    }

    // 단계 완료 = 해당 단계 이력 존재 + RUNNING/PENDING 없음
    function stageDone(st){
      var rs = ALL.filter(function(r){ return r.stage===st; });
      return rs.length>0 && !rs.some(function(r){ return r.status==='RUNNING'||r.status==='PENDING'; });
    }
    function updateReportBtn(){
      var btn = document.getElementById('reqReportBtn');
      var allDone = ['관리','분석','설계'].every(stageDone);
      btn.disabled = !allDone;
      btn.title = allDone ? '' : '관리·분석·설계 단계가 모두 완료되어야 요청할 수 있습니다.';
      btn.onclick = allDone ? function(){
        if(!confirm('검토결과서를 요청하시겠습니까?\nQA 승인 후 발급됩니다.')) return;
        M.addNotification({ to:(u.name||'QA'), type:'report', title:'검토결과서 요청 접수',
          message:'검토결과서 발급 요청이 접수되었습니다.', by:(u.name||'PM'), at:new Date().toISOString().slice(0,10) });
        if(window.QAGPT_BELL) window.QAGPT_BELL.refresh();
        alert('검토결과서를 요청했습니다. 이후 진행은 알림으로 안내됩니다.');
      } : null;
      if(window.QAGPT_LAYOUT) window.QAGPT_LAYOUT.applyRoleGates(document.querySelector('.page-head'));
    }

    // 실 API 우선 → 실패 시 목업 폴백 (정적 프리뷰에서도 동작)
    function load(){
      document.getElementById('scopeTag').innerHTML = '<span class="pill g">전체</span>';
      fetch('/api/reviews')
        .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
        .then(function(list){ ALL = list.map(normApi); render(); })
        .catch(function(){ ALL = M.REVIEWS.map(normMock).sort(function(a,b){return b.reviewId-a.reviewId;}); render(); });
    }

    document.getElementById('stageSel').addEventListener('change', render);
    document.getElementById('refreshBtn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
