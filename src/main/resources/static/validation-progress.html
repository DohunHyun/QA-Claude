<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검증 현황 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="validate" data-page="validation-progress">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> AI 검증 <span class="sep">›</span> 검증 현황</div>
    <div class="page-head">
      <div><h1>검증 현황</h1><p>프로젝트의 진행 중·완료된 검증 회차와 4-Phase 진행 상태를 확인합니다.</p></div>
      <div class="btn-row">
        <button class="btn" id="reqReportBtn" data-role="PM,QA" data-role-mode="disable" disabled>검토결과서 요청</button>
        <a class="btn sec" href="validation-upload.html">＋ 새 검증</a>
      </div>
    </div>

    <!-- 프로젝트 / 단계 선택 -->
    <div class="filterbar">
      <div class="fg"><label>프로젝트</label><select id="projSel" style="max-width:360px"></select></div>
      <div class="fg"><label>단계</label><select id="stageSel"><option value="">전체</option><option>관리</option><option>분석</option><option>설계</option></select></div>
      <div class="spacer"></div>
      <button class="btn sm sec" id="refreshBtn">↻ 새로고침</button>
    </div>

    <div id="detail"><section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">불러오는 중…</div></section></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M = window.MOCK, e = M.esc;
    var u = M.currentUser() || {};
    var params = new URLSearchParams(location.search);
    var ALL = [];   // 정규화된 검토 목록(프로젝트·단계 포함)
    var PROJ_API = [];   // 백엔드 승인(ACTIVE/APPROVED) 프로젝트 — 검토 이력 0건이어도 선택 노출
    var ready = false;   // 최초 로드 완료 여부(애니메이션/폴링 게이트)

    var PNAME = {}, PID = {}; M.PROJECTS.forEach(function(p){ PNAME[p.code]=p.name; PID[p.code]=p.id; });

    function fmtDate(iso){ return iso ? String(iso).replace('T',' ').replace('Z','').slice(0,16) : '-'; }
    function stageOf(type){ var a=M.ARTIFACTS.filter(function(x){return x.type===type;})[0]; return a?a.stage:'-'; }
    function normApi(r){
      return { reviewId:r.reviewId, projectId:r.projectId, artifactLabel:r.artifactLabel||'미분류', fileName:r.fileName,
        projectCode:r.projectCode||'미지정', projectName:r.projectName||'미지정 프로젝트',
        stage:r.stage||stageOf(r.artifactType), round:r.round, status:r.status, passed:r.passed,
        defectCount:r.defectCount, createdAt:r.createdAt };
    }
    function normMock(r){
      return { reviewId:r.id, projectId:PID[r.project], artifactLabel:r.artifact, fileName:'', projectCode:r.project,
        projectName:PNAME[r.project]||r.project, stage:r.stage, round:r.round, status:r.status,
        passed:r.passed, defectCount:(r.error||0)+(r.warn||0), createdAt:r.date };
    }
    function verdict(r){
      if(r.status==='COMPLETED') return r.passed ? '<span class="state done">통과</span>' : '<span class="state fail">미통과</span>';
      return '<span class="muted">-</span>';
    }
    // 대기(진행중) 검증행 → 실제 리뷰와 동일 shape로 정규화 (status RUNNING, 판정 미정)
    function normPending(p){
      return { reviewId:p.tempId, projectId:p.projectId, artifactLabel:p.artifactLabel, fileName:p.fileName,
        projectCode:p.projectCode, projectName:p.projectName, stage:p.stage, round:p.round,
        status:'RUNNING', passed:null, defectCount:0, createdAt:new Date(p.startedAt).toISOString(),
        _pending:true, _startedAt:p.startedAt };
    }
    // 동적 Phase 그래프 (진행% → 현재 Phase). 기존 .steps/.progress CSS 재사용.
    var PH_LABELS=['표준 보증','요구사항 품질','정합성 체크','결과물 생성'];
    var PH_CAPS=['표준 보증 검증 중…','요구사항 품질 검증 중…','정합성 검사 중…','결과물 생성 중…'];
    function phaseGraphHtml(pct){
      var phase=Math.max(1,Math.min(4,Math.ceil(pct/25)));
      var steps=PH_LABELS.map(function(lab,i){
        var n=i+1, cls=n<phase?'st done':(n===phase?'st cur':'st'), mark=n<phase?'✓':String(n);
        return '<div class="'+cls+'"><span class="n">'+mark+'</span>Phase'+n+' '+e(lab)+'</div>';
      }).join('');
      return '<section class="panel"><div class="p-body">'
        +'<div class="steps">'+steps+'</div>'
        +'<div class="progress" style="margin-top:12px"><span style="width:'+pct+'%"></span></div>'
        +'<div class="muted" style="margin-top:8px">'+e(PH_CAPS[phase-1])+' ('+pct+'%)</div>'
        +'</div></section>';
    }
    function projList(){
      var seen={}, out=[];
      // 백엔드 승인(ACTIVE/APPROVED) 프로젝트를 소스로 (검토 이력 0건이어도 선택 가능).
      // 목업 M.PROJECTS 를 항상 섞지 않는다 → 프로젝트 목록·단계별 검증과 소스 일치.
      // (오프라인은 PROJ_API 가 비고, 아래 ALL(목업 검토) 코드로 3개 데모가 채워진다.)
      PROJ_API.forEach(function(p){ if(!seen[p.code]){ seen[p.code]=1; out.push({code:p.code, name:p.name}); } });
      // 이력에만 존재하는 코드(프로젝트 미연결 → '미지정' 등)를 뒤에 추가
      ALL.forEach(function(r){ if(!seen[r.projectCode]){ seen[r.projectCode]=1; out.push({code:r.projectCode, name:r.projectName}); } });
      // 대기(진행중) 검증은 '이미 목록에 있는(백엔드/이력) 프로젝트'에만 표시한다.
      // (DB에서 삭제된 프로젝트의 잔여 대기행이 유령 항목으로 뜨지 않도록 — 정합성)
      return out;
    }
    function curCode(){ return document.getElementById('projSel').value; }

    function render(){
      var code=curCode();
      var stageF=document.getElementById('stageSel').value;
      var pend=M.pendingReviewsFor(code).map(normPending)
                .filter(function(r){ return !stageF || r.stage===stageF; });
      var real=ALL.filter(function(r){ return r.projectCode===code && (!stageF || r.stage===stageF); });
      var revs=pend.concat(real).sort(function(a,b){
        var ar=(a.status==='RUNNING'||a.status==='PENDING')?1:0, br=(b.status==='RUNNING'||b.status==='PENDING')?1:0;
        if(ar!==br) return br-ar;            // 진행중을 상단으로
        return b.reviewId-a.reviewId;
      });
      var running=revs.filter(function(r){ return r.status==='RUNNING'||r.status==='PENDING'; });

      var html='';
      if(running.length){
        html += running.map(function(r){
          var pct = r._pending ? M.phaseProgress(r._startedAt).pct : 62;
          return phaseGraphHtml(pct);
        }).join('');
      } else {
        html += '<div class="note" style="margin-bottom:14px">현재 <b>'+e(PNAME[code]||code)+'</b>에 진행 중인 검증이 없습니다.</div>';
      }

      // 검증 큐 / 이력 — 단계 컬럼 포함
      html += '<section class="panel"><div class="p-head"><h2>검증 큐 / 최근 이력 · '+e(code)+'</h2>'
        +'<span class="more">'+revs.length+'건</span></div><div class="p-body flush"><div class="tbl-scroll"><table class="tbl">'
        +'<thead><tr><th class="num">검토ID</th><th class="num">단계</th><th>산출물</th><th>파일명</th><th class="num">회차</th><th style="width:160px">진행</th><th class="num">상태</th><th class="num">판정</th><th class="num">검증일</th></tr></thead><tbody>';
      html += revs.length
        ? revs.map(function(r){
            var pct=r._pending?M.phaseProgress(r._startedAt).pct:((r.status==='RUNNING'||r.status==='PENDING')?62:(r.status==='COMPLETED'?100:0));
            return '<tr onclick="location.href=\'validation-result.html?reviewId='+r.reviewId+'\'" style="cursor:pointer">'
              +'<td class="num">#'+r.reviewId+'</td><td class="num"><span class="pill g">'+e(r.stage)+'</span></td>'
              +'<td><b>'+e(r.artifactLabel)+'</b></td><td class="muted wrap-any">'+e(r.fileName||'-')+'</td>'
              +'<td class="num">'+r.round+'회차</td>'
              +'<td><div class="progress"><span style="width:'+pct+'%"></span></div></td>'
              +'<td class="num">'+M.stateHtml(r.status)+'</td><td class="num">'+verdict(r)+'</td>'
              +'<td class="num muted">'+fmtDate(r.createdAt)+'</td></tr>';
          }).join('')
        : '<tr><td colspan="9" class="muted" style="text-align:center;padding:22px">검증 이력이 없습니다.</td></tr>';
      html += '</tbody></table></div></div></section>';

      document.getElementById('detail').innerHTML=html;
      updateReportBtn(code);
    }

    // 단계 완료 = 해당 프로젝트·단계 이력 존재 + RUNNING/PENDING 없음
    function stageDone(code, st){
      var rs=ALL.filter(function(r){ return r.projectCode===code && r.stage===st; });
      return rs.length>0 && !rs.some(function(r){ return r.status==='RUNNING'||r.status==='PENDING'; });
    }
    // 모든 산출물(회차) 통과 시 요청 가능
    function allPassed(code){
      var rs=ALL.filter(function(r){ return r.projectCode===code; });
      return rs.length>0 && rs.every(function(r){ return r.status==='COMPLETED' && r.passed; });
    }
    function updateReportBtn(code){
      var btn=document.getElementById('reqReportBtn');
      var ok=allPassed(code);
      btn.disabled=!ok;
      btn.title=ok?'':'모든 산출물이 통과되어야 검토결과서를 요청할 수 있습니다.';
      btn.onclick=ok?function(){
        if(!confirm('['+code+'] 검토결과서 발급을 요청하시겠습니까?\nQA 승인 후 발급됩니다.')) return;
        var pid=(ALL.filter(function(r){return r.projectCode===code;})[0]||{}).projectId;
        fetch('/api/report-requests', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ projectId:String(pid), stageGroup:'분석/설계', requestedBy:(u.name||'PM') }) })
          .then(function(res){ if(!res.ok) throw new Error('http'); return res.json(); })
          .then(function(){ alert('검토결과서 발급을 요청했습니다. QA 승인 후 발급됩니다.'); })
          .catch(function(){
            // 백엔드 미연결(정적 프리뷰) → 목업 알림 폴백
            M.addNotification({ to:'김홍규', type:'report', title:'검토결과서 발급 요청',
              message:'['+code+'] '+(PNAME[code]||code)+' 검토결과서 발급 요청이 접수되었습니다.',
              projectCode:code, by:(u.name||'PM'), at:new Date().toISOString().slice(0,10) });
            if(window.QAGPT_BELL) window.QAGPT_BELL.refresh();
            alert('검토결과서 발급을 요청했습니다.(오프라인 — 목업 알림)');
          });
      }:null;
      if(window.QAGPT_LAYOUT) window.QAGPT_LAYOUT.applyRoleGates(document.querySelector('.page-head'));
    }

    function fillProjects(preferCode){
      var ps=projList();
      var sel=document.getElementById('projSel');
      if(!ps.length){ sel.innerHTML='<option value="">검토 이력 없음</option>'; return false; }
      sel.innerHTML=ps.map(function(p){ return '<option value="'+e(p.code)+'">'+e(p.code)+' · '+e(p.name)+'</option>'; }).join('');
      if(preferCode && ps.some(function(p){return p.code===preferCode;})) sel.value=preferCode;
      return true;
    }

    // 대기행 완료 매칭: projectId(또는 code) + fileName 일치 & baseline 초과한 COMPLETED 실제
    // 리뷰가 나타나면 해당 대기행을 제거 → 실제 리뷰가 100%·완료·판정으로 렌더된다.
    function reconcile(){
      M.pendingReviews().forEach(function(p){
        var started=(p.startedAt||0)-120000;   // 시계 오차 2분 허용
        var hit=ALL.some(function(r){
          if(r.status!=='COMPLETED') return false;
          var idMatch=p.projectId!=null && String(r.projectId)===String(p.projectId);
          var codeMatch=r.projectCode && r.projectCode===p.projectCode;
          var fileMatch=r.fileName && p.fileName && r.fileName===p.fileName;
          if(!((idMatch||codeMatch) && fileMatch)) return false;
          // 업로드 이후 생성된 '새' 완료 리뷰인지: id(baseline 초과) 또는 생성시각(업로드 이후).
          // baseline이 경합으로 새 id와 같아져도(빠른 통과 케이스) 생성시각으로 매칭되어 무한대기 방지.
          var newerById=(r.reviewId||0) > (p.baselineMaxReviewId||0);
          var t=r.createdAt?Date.parse(r.createdAt):NaN;
          var newerByTime=!isNaN(t) && t>=started;
          return newerById || newerByTime;
        });
        if(hit) M.removePendingReview(p.tempId);
      });
    }
    // 실제 결과 폴링 — 대기행이 있는 동안만. 결과 도착 시 스왑, 없으면 99% 대기 유지.
    function pollReal(){
      if(!ready || !M.pendingReviews().length) return;
      fetch('/api/reviews')
        .then(function(res){ if(!res.ok) throw new Error('http'); return res.json(); })
        .then(function(list){ ALL=list.map(normApi); reconcile(); render(); })
        .catch(function(){ /* 백엔드 없음 → 실제 결과 없음. 99%에서 계속 대기 */ });
    }

    // 실 API 우선(프로젝트+검토 동시 로드) → 실패 시 목업 폴백
    function load(){
      Promise.all([
        fetch('/api/projects').then(function(r){ return r.ok?r.json():[]; }).catch(function(){ return []; }),
        fetch('/api/reviews').then(function(r){ if(!r.ok) throw new Error('http'); return r.json(); })
      ]).then(function(res){
        PROJ_API=(res[0]||[]).filter(function(p){ return p.status==='ACTIVE'||p.status==='APPROVED'; });
        PROJ_API.forEach(function(p){ if(!PNAME[p.code]) PNAME[p.code]=p.name; if(p.id!=null) PID[p.code]=p.id; });
        ALL=res[1].map(normApi); reconcile(); afterLoad();
      }).catch(function(){ PROJ_API=[]; ALL=M.REVIEWS.map(normMock); afterLoad(); });
    }
    function afterLoad(){
      // 진행중(대기) 검증이 있으면 그 프로젝트 우선, 다음 ?code, ?reviewId, ?projectId 순
      var pref=null, rid=params.get('reviewId'), pid=params.get('projectId'), qcode=params.get('code');
      var pend=M.pendingReviews();
      if(pend.length) pref=pend[0].projectCode;
      if(!pref && qcode) pref=qcode;
      if(!pref && rid){ var rv=ALL.filter(function(r){return String(r.reviewId)===String(rid);})[0]; if(rv) pref=rv.projectCode; }
      if(!pref && pid){ var pj=M.PROJECTS.filter(function(p){return String(p.id)===String(pid);})[0]; if(pj) pref=pj.code; }
      // 지정된 우선순위가 없으면 목록 상단(첫 프로젝트)부터 — 이력 있는 프로젝트 우선 (빈 화면 방지)
      if(!pref){
        var ps=projList();
        var withData=ps.filter(function(p){ return ALL.some(function(r){ return r.projectCode===p.code; }); });
        pref=(withData[0]||ps[0]||{}).code;
      }
      if(!fillProjects(pref)){
        document.getElementById('detail').innerHTML='<section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">검증 이력이 없습니다. <a href="validation-upload.html">새 검증 시작 ›</a></div></section>';
        return;
      }
      ready=true;
      render();
    }

    document.getElementById('projSel').addEventListener('change', render);
    document.getElementById('stageSel').addEventListener('change', render);
    document.getElementById('refreshBtn').addEventListener('click', load);
    load();

    // 진행바 애니메이션(대기행 있을 때만 재렌더) + 실제 결과 폴링
    setInterval(function(){ if(ready && M.pendingReviews().length) render(); }, 400);
    setInterval(pollReal, 2500);
  </script>
</body>
</html>
