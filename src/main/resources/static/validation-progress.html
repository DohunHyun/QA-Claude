<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검토 현황 · QA-Claude</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body data-nav="validate" data-page="validation-progress">
  <main class="main">
    <div class="crumb"><span class="home">HOME</span><span class="sep">›</span> AI 검증 <span class="sep">›</span> 검토 현황</div>
    <div class="page-head">
      <div><h1>검토 현황</h1><p>업로드된 산출물의 검증 회차 상태(진행 중·완료·통과 여부)를 실시간으로 확인합니다.</p></div>
      <a class="btn sec" href="validation-upload.html">＋ 새 검증</a>
    </div>

    <div class="filterbar">
      <div class="spacer"></div>
      <button class="btn sm sec" id="refreshBtn">↻ 새로고침</button>
      <span class="muted" id="scopeTag"></span>
    </div>

    <div id="detail"><section class="panel"><div class="p-body muted" style="text-align:center;padding:30px">불러오는 중…</div></section></div>
  </main>

  <script src="assets/js/mock.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    var M = window.MOCK, e = M.esc;

    function fmtDate(iso){
      if(!iso) return '-';
      // "2026-07-08T07:11:06.665Z" → "2026-07-08 07:11"
      return iso.replace('T', ' ').replace('Z', '').slice(0, 16);
    }
    function verdict(r){
      if(r.status === 'COMPLETED') return r.passed
        ? '<span class="state done">통과</span>'
        : '<span class="state fail">미통과</span>';
      return '<span class="muted">-</span>';
    }

    function render(reviews){
      var running = reviews.filter(function(r){ return r.status === 'RUNNING' || r.status === 'PENDING'; });
      var html = '';

      if(running.length){
        html += '<div class="note" style="margin-bottom:14px">🔄 진행 중인 검증 <b>' + running.length + '</b>건이 있습니다. 완료되면 아래 목록에서 결과를 확인하세요.</div>';
      }

      html += '<section class="panel"><div class="p-head"><h2>검증 회차 목록</h2>'
        + '<span class="more">' + reviews.length + '건</span></div>'
        + '<div class="p-body flush"><table class="tbl">'
        + '<thead><tr><th class="num">검토ID</th><th>산출물</th><th>파일명</th>'
        + '<th class="num">회차</th><th class="num">상태</th><th class="num">판정</th>'
        + '<th class="num">결함</th><th class="num">검증일</th></tr></thead><tbody>';

      html += reviews.length
        ? reviews.map(function(r){
            return '<tr onclick="location.href=\'validation-result.html?reviewId=' + r.reviewId + '\'" style="cursor:pointer">'
              + '<td class="num">#' + r.reviewId + '</td>'
              + '<td><b>' + e(r.artifactLabel || '미분류') + '</b></td>'
              + '<td class="muted">' + e(r.fileName || '-') + '</td>'
              + '<td class="num">' + r.round + '회차</td>'
              + '<td class="num">' + M.stateHtml(r.status) + '</td>'
              + '<td class="num">' + verdict(r) + '</td>'
              + '<td class="num">' + r.defectCount + '건</td>'
              + '<td class="num muted">' + fmtDate(r.createdAt) + '</td></tr>';
          }).join('')
        : '<tr><td colspan="8" class="muted" style="text-align:center;padding:22px">검증 이력이 없습니다. <a href="validation-upload.html">새 검증 시작 ›</a></td></tr>';

      html += '</tbody></table></div></section>';
      document.getElementById('detail').innerHTML = html;
    }

    function load(){
      document.getElementById('scopeTag').innerHTML = '<span class="pill g">전체</span>';
      fetch('/api/reviews')
        .then(function(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
        .then(render)
        .catch(function(err){
          document.getElementById('detail').innerHTML =
            '<section class="panel"><div class="p-body"><span class="err">검토 목록을 불러오지 못했습니다 (' + e(err.message) + ').</span></div></section>';
        });
    }

    document.getElementById('refreshBtn').addEventListener('click', load);
    load();
  </script>
</body>
</html>
